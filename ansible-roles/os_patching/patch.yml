---
############################################################
# ENTERPRISE LINUX PATCHING
############################################################

- name: Enterprise Linux Patching
  hosts: "{{ hosts.split(';') | join(':') }}"
  gather_facts: true

  vars:
    EXCLUDE_PKGS: "{{ EXCLUDE_PKGS | default('') }}"
    exclude_packages_list: >-
      {{ EXCLUDE_PKGS.split(';')
         | map('trim')
         | reject('equalto', '')
         | list }}

  roles:
    - precheck
    - patch
    - reboot
    - postcheck


############################################################
# GENERATE PATCH REPORT
############################################################

- name: Generate patch report
  hosts: localhost
  gather_facts: no

  vars:
    target_hosts: "{{ hosts.split(';') }}"

  tasks:
    - name: Initialize results list
      set_fact:
        results: []

    - name: Collect patch results
      set_fact:
        results: "{{ results + [ hostvars[item].patch_result | default({'host': item, 'status': 'UNKNOWN'}) ] }}"
      loop: "{{ target_hosts }}"

    - name: Ensure reports directory exists
      file:
        path: reports
        state: directory
        mode: '0755'

    - name: Create HTML report
      template:
        src: templates/report.j2
        dest: reports/patch_report.html

    - name: Show report path
      debug:
        msg: "Report generated at reports/patch_report.html"
