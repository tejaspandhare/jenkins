---
- name: Enterprise Linux Patching and Reporting
  hosts: "{{ hosts | default('localhost') | split(';') | select('match', '.+') | join(':') }}"
  gather_facts: true

  vars:
    ansible_remote_tmp: "/tmp/ansible_tmp"

    exclude_packages_list: >-
      {{ EXCLUDE_PKGS | default('') | split(';')
         | map('trim')
         | reject('equalto', '')
         | list }}

    report_dir: "{{ playbook_dir }}/reports"
    report_file: "{{ report_dir }}/patch_report.html"

  roles:
    - precheck
    - patch
    - reboot
    - postcheck

  tasks:

    - name: Generate patch report on controller
      run_once: true
      delegate_to: localhost

      block:

        - name: Reset temp directory
          file:
            path: /tmp/ansible_tmp
            state: absent

        - name: Create temp directory
          file:
            path: /tmp/ansible_tmp
            state: directory
            mode: '0777'

        - name: Ensure reports directory exists
          file:
            path: "{{ report_dir }}"
            state: directory
            mode: '0755'

        - name: Build patch results summary
          set_fact:
            patch_results_summary: >-
              {{ groups['all']
                 | map('extract', hostvars, 'patch_result')
                 | select('defined')
                 | list }}

        - name: Print clean patch summary
          debug:
            msg: |
              ================= PATCH SUMMARY =================

              {% for h in patch_results_summary %}
              Host    : {{ h.host }}
              OS      : {{ h.os | default('N/A') }}
              Kernel  : {{ h.old_kernel | default('N/A') }} -> {{ h.new_kernel | default('N/A') }}
              Updated : {{ h.updated | default('N/A') }}
              Reboot  : {{ h.reboot | default('N/A') }}
              Status  : {{ h.status | default('UNKNOWN') }}
              -------------------------------------------------
              {% endfor %}

        - name: Create HTML report
          template:
            src: "{{ playbook_dir }}/templates/report.j2"
            dest: "{{ report_file }}"

        - name: Show report path
          debug:
            msg: "Report generated at {{ report_file }}"
