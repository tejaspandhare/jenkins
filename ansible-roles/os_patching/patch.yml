---
############################################################
# ENTERPRISE LINUX PATCHING
############################################################

- name: Enterprise Linux Patching
  hosts: "{{ hosts }}"
  become: yes
  serial: 5
  gather_facts: yes

  roles:
    - precheck
    - patch
    - reboot
    - postcheck


############################################################
# GENERATE PATCH REPORT
############################################################

- name: Generate patch report
  hosts: localhost
  gather_facts: no

  vars:
    target_hosts: "{{ hosts }}"

  tasks:

    - name: Collect patch results from hosts
      set_fact:
        results: "{{ groups[target_hosts] | map('extract', hostvars, 'patch_result') | list }}"

    - name: Create HTML report
      template:
        src: templates/report.j2
        dest: reports/patch_report.html
