---
############################################################
# ENTERPRISE LINUX PATCHING
############################################################

- name: Enterprise Linux Patching
  hosts: "{{ hosts | default('localhost') | split(';') | join(':') }}"
  gather_facts: true

  vars:
    EXCLUDE_PKGS: "{{ EXCLUDE_PKGS | default('') }}"
    exclude_packages_list: >-
      {{ EXCLUDE_PKGS.split(';')
         | map('trim')
         | reject('equalto', '')
         | list }}

  roles:
    - precheck
    - patch
    - reboot
    - postcheck


############################################################
# GENERATE PATCH REPORT
############################################################

- name: Generate patch report
  hosts: localhost
  gather_facts: no

  vars:
    target_hosts: "{{ hosts | default('localhost') | split(';') }}"
    report_dir: "{{ playbook_dir }}/reports"
    report_file: "{{ report_dir }}/patch_report.html"

  tasks:
    - name: Initialize results list
      set_fact:
        results: []

    - name: Collect patch results from hosts
      set_fact:
        results: "{{ results + [ hostvars[item].patch_result | default({'host': item, 'status': 'UNKNOWN'}) ] }}"
      loop: "{{ target_hosts }}"
      when: hostvars[item] is defined

    - name: Ensure reports directory exists
      file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Create HTML report
      template:
        src: templates/report.j2
        dest: "{{ report_file }}"

    - name: Show report path
      debug:
        msg: "Report generated at {{ report_file }}"
