---
# ------------------------------
# 0. Initialize patch result
# ------------------------------
- name: Initialize patch result
  set_fact:
    patch_result:
      host: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      old_kernel: "{{ ansible_kernel }}"
      new_kernel: "{{ ansible_kernel }}"
      updated: false
      reboot: false
      status: "IN_PROGRESS"

# ------------------------------
# 1. Patch OS (multi-OS unified)
# ------------------------------
- name: Patch Debian/Ubuntu
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"
  register: patch_cmd

- name: Patch RHEL
  ansible.builtin.dnf:
    name: "*"
    state: latest
  when: ansible_os_family == "RedHat"
  register: patch_cmd

- name: Patch SUSE
  ansible.builtin.zypper:
    name: "*"
    state: latest
  when: ansible_os_family == "Suse"
  register: patch_cmd

# ------------------------------
# 2. Get latest installed kernel (UNIFIED METHOD)
# ------------------------------
- name: Get latest installed kernel (all Linux)
  shell: |
    ls -1 /boot/vmlinuz-* 2>/dev/null \
    | sed 's#.*/vmlinuz-##' \
    | sort -V \
    | tail -1
  args:
    executable: /bin/bash
  register: kernel_cmd
  changed_when: false
  failed_when: false

# ------------------------------
# 3. Normalize kernel value (SAFE)
# ------------------------------
- name: Normalize latest kernel value
  set_fact:
    latest_kernel: "{{ kernel_cmd.stdout | default('') | trim }}"

- name: Fallback if kernel detection failed
  set_fact:
    latest_kernel: "{{ patch_result.old_kernel }}"
  when: latest_kernel == ""

# ------------------------------
# 4. Update patch_result (CORRECT LOGIC)
# ------------------------------
- name: Update patch_result after patching
  set_fact:
    patch_result: "{{ patch_result | combine({
      'new_kernel': latest_kernel,
      'updated': (latest_kernel != patch_result.old_kernel)
    }) }}"

# ------------------------------
# 5. Debug output
# ------------------------------
- name: Show patch result
  debug:
    msg: |
      Host         : {{ inventory_hostname }}
      Old Kernel   : {{ patch_result.old_kernel }}
      New Kernel   : {{ patch_result.new_kernel }}
      Kernel Changed: {{ patch_result.updated }}
      Pkg Changed  : {{ patch_cmd.changed | default(false) }}
