---
# ------------------------------
# 0. Initialize patch result (MANDATORY)
# ------------------------------
- name: Initialize patch result structure
  ansible.builtin.set_fact:
    patch_result:
      host: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      old_kernel: "{{ ansible_kernel }}"
      new_kernel: ""
      updated: false
      reboot: false
      status: "IN_PROGRESS"

# ------------------------------
# 1. Patch Debian / Ubuntu
# ------------------------------
- name: Patch Debian/Ubuntu
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"
  register: upgrade_result

# ------------------------------
# 2. Patch RHEL / CentOS / Rocky / Alma
# ------------------------------
- name: Patch RHEL
  ansible.builtin.dnf:
    name: "*"
    state: latest
  when: ansible_os_family == "RedHat"
  register: upgrade_result

# ------------------------------
# 3. Patch SUSE / SLES
# ------------------------------
- name: Patch SUSE
  ansible.builtin.zypper:
    name: "*"
    state: latest
  when: ansible_os_family == "Suse"
  register: upgrade_result

# ------------------------------
# 4. Show patch result
# ------------------------------
- name: Show patch result
  ansible.builtin.debug:
    msg: "Patching completed on {{ inventory_hostname }} | Changes applied: {{ upgrade_result.changed | default(false) }}"

# ------------------------------
# 5. Update patch_result safely
# ------------------------------
- name: Set patch_result updated flag
  ansible.builtin.set_fact:
    patch_result: "{{ patch_result | combine({'updated': upgrade_result.changed | default(false)}) }}"
