---
# ==========================================================
# PATCH ROLE
# Supports:
#   - Ubuntu / Debian
#   - RHEL / Rocky / Alma / Oracle Linux
#   - SLES / openSUSE
# ==========================================================

# ------------------------------
# 0. Initialize patch result
# ------------------------------
- name: Initialize patch result
  ansible.builtin.set_fact:
    patch_result:
      host: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      old_kernel: "{{ ansible_kernel }}"
      new_kernel: "{{ ansible_kernel }}"
      updated: false
      reboot: false
      status: "IN_PROGRESS"

# ------------------------------
# 1. Ensure Ubuntu kernel meta-package exists
# ------------------------------
- name: Ensure Ubuntu kernel meta-package exists
  ansible.builtin.apt:
    name: linux-generic
    state: present
  when:
    - ansible_distribution == "Ubuntu"

# ------------------------------
# 2. Patch Debian/Ubuntu
# ------------------------------
- name: Patch Debian/Ubuntu
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: false
  register: patch_cmd
  when: ansible_os_family == "Debian"

# ------------------------------
# 3. Patch RedHat Family
# ------------------------------
- name: Patch RedHat family
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  register: patch_cmd
  when: ansible_os_family == "RedHat"

# ------------------------------
# 4. Patch SUSE Family
# ------------------------------
- name: Patch SUSE family
  community.general.zypper:
    name: "*"
    state: latest
  register: patch_cmd
  when: ansible_os_family == "Suse"

# ------------------------------
# 5. Detect newest installed kernel
# ------------------------------
- name: Detect latest installed kernel
  ansible.builtin.shell: |
    ls -1 /boot/vmlinuz-* 2>/dev/null \
      | sed 's#.*/vmlinuz-##' \
      | sort -V \
      | tail -1
  args:
    executable: /bin/bash
  register: kernel_cmd
  changed_when: false
  failed_when: false

# ------------------------------
# 6. Normalize kernel value
# ------------------------------
- name: Normalize latest kernel value
  ansible.builtin.set_fact:
    latest_kernel: >-
      {{
        kernel_cmd.stdout | trim
        if (kernel_cmd.stdout | trim | length > 0)
        else ansible_kernel
      }}

# ------------------------------
# 7. Determine reboot requirement
# ------------------------------
- name: Determine reboot requirement
  ansible.builtin.set_fact:
    reboot_required: "{{ latest_kernel != ansible_kernel }}"

# ------------------------------
# 8. Update patch result
# ------------------------------
- name: Update patch result
  ansible.builtin.set_fact:
    patch_result: >-
      {{
        patch_result | combine({
          'new_kernel': latest_kernel,
          'updated': (patch_cmd.changed | default(false)),
          'reboot': reboot_required,
          'status': (
            'UPDATED'
            if (patch_cmd.changed | default(false))
            else 'NO_CHANGES'
          )
        })
      }}

# ------------------------------
# 9. Display patch summary
# ------------------------------
- name: Show patch summary
  ansible.builtin.debug:
    msg: |
      Host            : {{ patch_result.host }}
      OS              : {{ patch_result.os }}
      Old Kernel      : {{ patch_result.old_kernel }}
      New Kernel      : {{ patch_result.new_kernel }}
      Package Updated : {{ patch_result.updated }}
      Reboot Required : {{ patch_result.reboot }}
      Status          : {{ patch_result.status }}
