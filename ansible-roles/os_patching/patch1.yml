---
############################################################
# ENTERPRISE LINUX PATCHING
############################################################

- name: Enterprise Linux Patching
  hosts: "{{ hosts | default('localhost') | split(';') | select('match', '.+') | join(':') }}"
  gather_facts: true

  vars:
    ansible_remote_tmp: "/tmp/ansible_tmp"

    exclude_packages_list: >-
      {{ EXCLUDE_PKGS | default('') | split(';')
      | map('trim') | reject('equalto', '') | list }}

  roles:
    - role: precheck
    - role: patch
    - role: reboot
    - role: postcheck


############################################################
# GENERATE PATCH REPORT
############################################################

- name: Generate patch report
  hosts: localhost
  gather_facts: false

  vars:
    ansible_remote_tmp: "/tmp/ansible_tmp"
    ansible_local_tmp: "/tmp/ansible_tmp"

    target_hosts_list: >-
      {{ hosts | default('localhost') | split(';')
      | map('trim') | reject('equalto', '') | list }}

    report_dir: "{{ playbook_dir }}/reports"
    report_file: "{{ report_dir }}/patch_report.html"

  tasks:

    - name: Ensure temp directory is clean
      file:
        path: "{{ ansible_local_tmp }}"
        state: absent

    - name: Recreate temp directory
      file:
        path: "{{ ansible_local_tmp }}"
        state: directory
        mode: '0777'

    - name: Ensure reports directory exists
      file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Initialize patch results summary
      set_fact:
        patch_results_summary: []

    - name: Collect patch results from hosts
      set_fact:
        patch_results_summary: >-
          {{ patch_results_summary + [
            hostvars[item].patch_result
            | default({'host': item, 'status': 'UNKNOWN'})
          ] }}
      loop: "{{ target_hosts_list }}"
      when: hostvars[item] is defined

    # ✅ CLEAN CONSOLE OUTPUT
    - name: Print patch summary (clean format)
      debug:
        msg: |
          ================= PATCH SUMMARY =================
          {% for host in patch_results_summary %}
          Host      : {{ host.host }}
          OS        : {{ host.os | default('N/A') }}
          Kernel    : {{ host.old_kernel | default('N/A') }} → {{ host.new_kernel | default('N/A') }}
          Updated   : {{ host.updated | default('N/A') }}
          Reboot    : {{ host.reboot | default('N/A') }}
          Status    : {{ host.status | default('UNKNOWN') }}
          -------------------------------------------------
          {% endfor %}

    - name: Create HTML report
      template:
        src: "{{ playbook_dir }}/templates/report.j2"
        dest: "{{ report_file }}"

    - name: Show report path
      debug:
        msg: "Report generated at {{ report_file }}"
