---
# ------------------------------
# 1. Get running kernel
# ------------------------------
- name: Get running kernel
  ansible.builtin.command: uname -r
  register: running_kernel_after
  changed_when: false

# ------------------------------
# 2. Validate kernel
# ------------------------------
- name: Validate kernel boot
  ansible.builtin.set_fact:
    kernel_match: "{{ running_kernel_after.stdout == patch_result.new_kernel }}"

# ------------------------------
# 3. Final status
# ------------------------------
- name: Finalize patch result
  ansible.builtin.set_fact:
    patch_result: >-
      {{
        patch_result | combine({
          'status': (
            'SUCCESS'
            if kernel_match
            else 'FAILED'
          ),
          'reboot': not kernel_match
        })
      }}

# ------------------------------
# 4. Show final result
# ------------------------------
- name: Show final result
  ansible.builtin.debug:
    msg: |
      Host        : {{ inventory_hostname }}
      OS          : {{ patch_result.os }}
      Old Kernel  : {{ patch_result.old_kernel }}
      New Kernel  : {{ patch_result.new_kernel }}
      Running     : {{ running_kernel_after.stdout }}
      Status      : {{ patch_result.status }}
