---
# ------------------------------
# Capture new kernel
# ------------------------------
- name: Capture new kernel
  command: uname -r
  register: new_kernel
  changed_when: false

# ------------------------------
# Display kernel change
# ------------------------------
- name: Show kernel transition
  debug:
    msg: "Kernel: {{ patch_result.old_kernel }} → {{ new_kernel.stdout }}"

# ------------------------------
# Update final result
# ------------------------------
- name: Finalize patch_result
  set_fact:
    patch_result: >-
      {{ patch_result | combine({
        'new_kernel': new_kernel.stdout,
        'status': 'SUCCESS'
      }) }}
