---
# ==========================================================
# POSTCHECK ROLE
# Validates kernel after reboot and final patch status
# ==========================================================

# ------------------------------
# 1. Capture running kernel
# ------------------------------
- name: Capture running kernel after patch
  ansible.builtin.command: uname -r
  register: running_kernel_after
  changed_when: false

# ------------------------------
# 2. Validate kernel boot success
# ------------------------------
- name: Validate kernel matches expected kernel
  ansible.builtin.set_fact:
    kernel_match: "{{ running_kernel_after.stdout == patch_result.new_kernel }}"

# ------------------------------
# 3. Determine final status
# ------------------------------
- name: Finalize patch_result status
  ansible.builtin.set_fact:
    patch_result: >-
      {{
        patch_result | combine({
          'status': (
            'SUCCESS'
            if kernel_match and patch_result.status != 'FAILED'
            else 'FAILED'
          ),
          'reboot': (
            true
            if patch_result.reboot and not kernel_match
            else patch_result.reboot
          )
        })
      }}

# ------------------------------
# 4. Show final result
# ------------------------------
- name: Show final result
  ansible.builtin.debug:
    msg: |
      Host        : {{ inventory_hostname }}
      OS          : {{ patch_result.os }}
      Old Kernel  : {{ patch_result.old_kernel }}
      New Kernel  : {{ patch_result.new_kernel }}
      Running     : {{ running_kernel_after.stdout }}
      Kernel OK   : {{ kernel_match }}
      Updated     : {{ patch_result.updated }}
      Reboot Req  : {{ patch_result.reboot }}
      Status      : {{ patch_result.status }}
