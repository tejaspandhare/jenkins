---
# ------------------------------
# 1. Capture running kernel AFTER patch/reboot
# ------------------------------
- name: Capture running kernel
  command: uname -r
  register: running_kernel_after
  changed_when: false

# ------------------------------
# 2. Display kernel transition
# ------------------------------
- name: Display kernel transition
  debug:
    msg: |
      Kernel on {{ inventory_hostname }}:
      Old Kernel       : {{ patch_result.old_kernel }}
      Installed Kernel : {{ patch_result.new_kernel }}
      Running Kernel   : {{ running_kernel_after.stdout }}

# ------------------------------
# 3. Finalize patch_result (DO NOT overwrite installed kernel)
# ------------------------------
- name: Finalize patch_result
  set_fact:
    patch_result: "{{ patch_result | combine({
      'status': ('FAILED' if (upgrade_result is failed) else 'SUCCESS')
    }) }}"

# ------------------------------
# 4. Optional debug
# ------------------------------
- name: Show finalized patch_result
  debug:
    msg: |
      Host    : {{ inventory_hostname }}
      OS      : {{ patch_result.os }}
      Kernel  : {{ patch_result.old_kernel }} → {{ patch_result.new_kernel }}
      Running : {{ running_kernel_after.stdout }}
      Updated : {{ patch_result.updated }}
      Reboot  : {{ patch_result.reboot }}
      Status  : {{ patch_result.status }}
