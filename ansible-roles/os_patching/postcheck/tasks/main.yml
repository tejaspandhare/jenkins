---
# ------------------------------
# 1. Capture running kernel
# ------------------------------
- name: Capture running kernel after patch
  command: uname -r
  register: running_kernel_after
  changed_when: false

# ------------------------------
# 2. Finalize status safely
# ------------------------------
- name: Finalize patch_result
  set_fact:
    patch_result: "{{ patch_result | combine({
      'status': (patch_result.status if patch_result.status == 'FAILED' else 'SUCCESS')
    }) }}"

# ------------------------------
# 3. Show final result
# ------------------------------
- name: Show final result
  debug:
    msg: |
      Host    : {{ inventory_hostname }}
      OS      : {{ patch_result.os }}
      Kernel  : {{ patch_result.old_kernel }} → {{ patch_result.new_kernel }}
      Running : {{ running_kernel_after.stdout }}
      Updated : {{ patch_result.updated }}
      Reboot  : {{ patch_result.reboot }}
      Status  : {{ patch_result.status }}
