---
# ------------------------------
# postcheck/tasks/main.yml
# ------------------------------

# Capture the new kernel after patch/reboot
- name: Capture new kernel
  command: uname -r
  register: new_kernel
  changed_when: false

# Show old -> new kernel on console
- name: Display kernel change
  debug:
    msg: "Kernel on {{ inventory_hostname }}: {{ patch_result.old_kernel }} → {{ new_kernel.stdout }}"

# Update patch_result safely (merge facts, do not overwrite)
- name: Update patch_result with final info
  set_fact:
    patch_result: >-
      {{ patch_result | combine({
        'os': ansible_distribution ~ " " ~ ansible_distribution_version,
        'new_kernel': new_kernel.stdout,
        'status': ( 'FAILED' if upgrade_result is failed else 'SUCCESS' )
      }) }}
