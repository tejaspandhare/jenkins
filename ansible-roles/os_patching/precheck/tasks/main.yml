---
# ------------------------------
# 1. Gather disk usage for critical partitions
# ------------------------------
- name: Gather disk usage for /boot, /, /usr, /var
  ansible.builtin.shell: df -BG / /usr /var /boot | tail -n +2
  register: disk_usage
  changed_when: false

- name: Fail if critical partitions have less than required free space
  ansible.builtin.fail:
    msg: "Partition {{ item[5] }} has less than required free space ({{ item[3] }}), patching cannot continue!"
  loop: "{{ disk_usage.stdout_lines | map('split') | list }}"
  loop_control:
    label: "{{ item[5] }}"
  when: >
    (item[5] == '/boot' and (item[3] | regex_replace('G','') | int < 1)) or
    (item[5] in ['/','/usr','/var'] and (item[3] | regex_replace('G','') | int < 5))

# ------------------------------
# 2. Fix broken packages FIRST (Debian/Ubuntu)
# ------------------------------
- name: Fix broken dependencies (Debian/Ubuntu)
  ansible.builtin.shell: apt-get -f install -y
  register: fix_broken_result
  changed_when: "'0 upgraded' not in fix_broken_result.stdout"
  when: ansible_os_family == "Debian"

# ------------------------------
# 3. Update apt cache
# ------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_os_family == "Debian"

# ------------------------------
# 4. Perform dist upgrade
# ------------------------------
- name: Dist upgrade system
  ansible.builtin.apt:
    upgrade: dist
  when: ansible_os_family == "Debian"

# ------------------------------
# 5. Remove old kernels SAFELY (keep latest 2)
# ------------------------------
- name: Remove old kernels safely (Debian/Ubuntu)
  ansible.builtin.shell: |
    dpkg -l 'linux-image-*' \
    | awk '/^ii/{ print $2 }' \
    | grep -v "$(uname -r)" \
    | sort -V \
    | head -n -2 \
    | xargs -r apt-get -y purge
  args:
    warn: false
  when: ansible_os_family == "Debian"

# ------------------------------
# 6. Autoremove unused packages
# ------------------------------
- name: Autoremove packages on Debian/Ubuntu
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

# ------------------------------
# 7. Clean /boot - RHEL/CentOS
# ------------------------------
- name: Clean /boot - remove old kernels (RHEL/CentOS)
  ansible.builtin.shell: |
    current=$(uname -r)
    kernels=$(rpm -q kernel | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    if [ -n "$kernels" ]; then
      for k in $kernels; do
        if [ "$k" != "$keep" ]; then
          echo "Removing kernel package $k"
          yum -y remove $k || true
        fi
      done
    else
      echo "No old kernels to remove"
    fi
  when: ansible_os_family == "RedHat"

- name: Autoremove packages on RHEL/CentOS
  ansible.builtin.yum:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "RedHat"

# ------------------------------
# 8. Clean /boot - SUSE
# ------------------------------
- name: Clean /boot - remove old kernels (SUSE)
  ansible.builtin.shell: |
    current=$(uname -r)
    kernels=$(rpm -q kernel-default | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    if [ -n "$kernels" ]; then
      for k in $kernels; do
        if [ "$k" != "$keep" ]; then
          echo "Removing kernel package $k"
          zypper -n rm $k || true
        fi
      done
    else
      echo "No old kernels to remove"
    fi
  when: ansible_os_family == "Suse"

- name: Autoremove packages on SUSE
  ansible.builtin.zypper:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "Suse"
