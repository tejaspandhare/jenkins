---
# ==========================================================
# PRECHECK - Common Linux Validation
# Supports:
#   - Ubuntu / Debian
#   - RHEL / Rocky / Alma / Oracle Linux
#   - SLES / openSUSE
# ==========================================================

# ------------------------------
# 1. Gather disk usage
# ------------------------------
- name: Gather disk usage
  ansible.builtin.command: df -BG / /usr /var /boot
  register: disk_usage
  changed_when: false
  failed_when: false

- name: Parse disk usage
  ansible.builtin.set_fact:
    disk_parsed: "{{ disk_usage.stdout_lines[1:] | map('split') | list }}"
  when: disk_usage.rc == 0

# ------------------------------
# 2. Validate free space
# ------------------------------
- name: Fail if critical filesystem is low on space
  ansible.builtin.fail:
    msg: "Partition {{ item[5] }} has low free space ({{ item[3] }})"
  loop: "{{ disk_parsed }}"
  loop_control:
    label: "{{ item[5] }}"
  when: >
    (item[5] == '/boot' and (item[3] | regex_replace('G','') | int < 1))
    or
    (item[5] in ['/', '/usr', '/var'] and (item[3] | regex_replace('G','') | int < 5))

# ------------------------------
# 3. Fix package issues
# ------------------------------
- name: Fix broken dependencies (Debian/Ubuntu)
  ansible.builtin.command: apt-get -f install -y
  register: fix_broken
  changed_when: "'0 upgraded' not in fix_broken.stdout"
  when: ansible_os_family == "Debian"

# ------------------------------
# 4. Refresh package metadata
# ------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Refresh DNF/YUM metadata
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_os_family == "RedHat"

- name: Refresh zypper repositories
  ansible.builtin.command: zypper --gpg-auto-import-keys refresh
  changed_when: false
  when: ansible_os_family == "Suse"

# ------------------------------
# 5. Ensure kernel tracking package exists
# ------------------------------
- name: Ensure Ubuntu kernel meta-package exists
  ansible.builtin.apt:
    name: linux-generic
    state: present
  when:
    - ansible_distribution == "Ubuntu"

# Optional sanity check for RHEL
- name: Ensure kernel package is present (RHEL)
  ansible.builtin.package:
    name: kernel
    state: present
  when:
    - ansible_os_family == "RedHat"

# Optional sanity check for SLES
- name: Ensure kernel-default package is present (SLES)
  ansible.builtin.package:
    name: kernel-default
    state: present
  when:
    - ansible_os_family == "Suse"

# ------------------------------
# 6. Capture running kernel
# ------------------------------
- name: Capture running kernel baseline
  ansible.builtin.set_fact:
    running_kernel: "{{ ansible_kernel }}"

# ------------------------------
# 7. Capture installed kernels
# ------------------------------
- name: Get installed kernels (Debian)
  ansible.builtin.shell: |
    dpkg -l 'linux-image-*' 2>/dev/null \
    | awk '/^ii/ {print $2}'
  args:
    executable: /bin/bash
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Get installed kernels (RedHat)
  ansible.builtin.shell: |
    rpm -q kernel
  args:
    executable: /bin/bash
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Get installed kernels (Suse)
  ansible.builtin.shell: |
    rpm -q kernel-default
  args:
    executable: /bin/bash
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Suse"

# ------------------------------
# 8. Precheck summary
# ------------------------------
- name: Show precheck summary
  ansible.builtin.debug:
    msg: |
      Precheck completed on {{ inventory_hostname }}
      OS             : {{ ansible_distribution }} {{ ansible_distribution_version }}
      Running Kernel : {{ running_kernel }}
      Disk Checked   : OK

      Installed Kernels:
      {{ installed_kernels.stdout | default('Not detected') }}
