---
# precheck/tasks/main.yml

- name: Gather disk usage for critical partitions
  ansible.builtin.shell: df -BG / /usr /var /boot | tail -n +2
  register: disk_usage
  changed_when: false

- name: Fail if critical partitions have less than required free space
  ansible.builtin.fail:
    msg: "Partition {{ item[5] }} has less than required free space ({{ item[3] }}), patching cannot continue!"
  loop: "{{ disk_usage.stdout_lines | map('split') | list }}"
  loop_control:
    label: "{{ item[5] }}"
  when: >
    (item[5] == '/boot' and (item[3] | regex_replace('G','') | int < 1)) or
    (item[5] in ['/','/usr','/var'] and (item[3] | regex_replace('G','') | int < 5))

# ------------------------------
# Clean /boot - Debian/Ubuntu
# ------------------------------
- name: Clean /boot - remove old kernels (Debian/Ubuntu)
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(ls /boot/vmlinuz-* 2>/dev/null | sed 's#/boot/vmlinuz-##' | sort -V | grep -v "^$current$")
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel files for $k"
        rm -f /boot/vmlinuz-$k /boot/initrd.img-$k /boot/System.map-$k /boot/config-$k || true
      fi
    done
  when: ansible_os_family == "Debian"

- name: Fix broken dependencies on Debian/Ubuntu
  ansible.builtin.command: apt-get -f install -y
  when: ansible_os_family == "Debian"

- name: Autoremove packages on Debian/Ubuntu
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

# ------------------------------
# Clean /boot - RHEL/CentOS
# ------------------------------
- name: Clean /boot - remove old kernels (RHEL/CentOS)
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(rpm -q kernel | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel package $k"
        yum -y remove $k || true
      fi
    done
  when: ansible_os_family == "RedHat"

- name: Autoremove packages on RHEL/CentOS
  ansible.builtin.yum:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "RedHat"

# ------------------------------
# Clean /boot - SUSE
# ------------------------------
- name: Clean /boot - remove old kernels (SUSE)
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(rpm -q kernel-default | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel package $k"
        zypper -n rm $k || true
      fi
    done
  when: ansible_os_family == "Suse"

- name: Autoremove packages on SUSE
  ansible.builtin.zypper:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "Suse"
