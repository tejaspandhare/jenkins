---
# precheck/tasks/main.yml

- name: Gather disk usage for critical partitions
  ansible.builtin.shell: df -BG / /usr /var /boot | tail -n +2
  register: disk_usage
  changed_when: false

- name: Fail if critical partitions have less than 5GB free
  ansible.builtin.fail:
    msg: "Partition {{ item.mount }} has less than 5GB free ({{ item.avail }}), patching cannot continue!"
  loop: "{{ disk_usage.stdout_lines | map('split') | list }}"
  loop_control:
    label: "{{ item[5] }}"
  when: item[3] | regex_replace('G','') | int < 5
  vars:
    # item[0]: Filesystem, item[1]: Size, item[2]: Used, item[3]: Avail, item[4]: Use%, item[5]: Mounted

- name: Clean /boot - Debian/Ubuntu
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(ls /boot/vmlinuz-* 2>/dev/null | sed 's#/boot/vmlinuz-##' | sort -V | grep -v "^$current$")
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel files for $k"
        rm -f /boot/vmlinuz-$k /boot/initrd.img-$k /boot/System.map-$k /boot/config-$k || true
      fi
    done
  when: ansible_os_family == "Debian"

- name: Fix broken dependencies on Debian/Ubuntu
  ansible.builtin.command: apt-get -f install -y
  when: ansible_os_family == "Debian"

- name: Autoremove packages on Debian/Ubuntu
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

- name: Clean /boot - RHEL/CentOS
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(rpm -q kernel | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel package $k"
        yum -y remove $k || true
      fi
    done
  when: ansible_os_family == "RedHat"

- name: Clean /boot - SUSE
  ansible.builtin.shell: |
    set -e
    current=$(uname -r)
    kernels=$(rpm -q kernel-default | grep -v "$current" | sort -V)
    keep=$(echo "$kernels" | tail -n 1)
    for k in $kernels; do
      if [ "$k" != "$keep" ]; then
        echo "Removing kernel package $k"
        zypper -n rm $k || true
      fi
    done
  when: ansible_os_family == "Suse"

- name: Autoremove packages on RHEL/CentOS
  ansible.builtin.yum:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "RedHat"

- name: Autoremove packages on SUSE
  ansible.builtin.zypper:
    name: '*'
    state: latest
    autoremove: yes
  when: ansible_os_family == "Suse"
