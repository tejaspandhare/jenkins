---
# ==========================================================
# PRECHECK - Common Linux Validation
# Supports:
#   - Ubuntu / Debian
#   - RHEL / Rocky / Alma / Oracle Linux
#   - SLES / openSUSE
# ==========================================================

# ------------------------------
# 1. Gather disk usage
# ------------------------------
- name: Gather root filesystem usage
  ansible.builtin.command: df -BG /
  register: root_usage
  changed_when: false
  failed_when: false

- name: Gather boot filesystem usage
  ansible.builtin.command: df -BG /boot
  register: boot_usage
  changed_when: false
  failed_when: false

# ------------------------------
# 2. Validate free space
# ------------------------------
- name: Parse root free space
  ansible.builtin.set_fact:
    root_free_gb: >-
      {{
        root_usage.stdout_lines[1].split()[3]
        | regex_replace('G', '')
        | int
      }}
  when: root_usage.rc == 0

- name: Parse boot free space
  ansible.builtin.set_fact:
    boot_free_gb: >-
      {{
        boot_usage.stdout_lines[1].split()[3]
        | regex_replace('G', '')
        | int
      }}
  when: boot_usage.rc == 0

- name: Validate root free space
  ansible.builtin.fail:
    msg: "Root filesystem has only {{ root_free_gb }}GB free"
  when: root_free_gb < 5

- name: Validate boot free space
  ansible.builtin.fail:
    msg: "/boot filesystem has only {{ boot_free_gb }}GB free"
  when: boot_free_gb < 1

# ------------------------------
# 3. Fix package issues
# ------------------------------
- name: Fix broken dependencies (Debian/Ubuntu)
  ansible.builtin.command: apt-get -f install -y
  register: fix_broken
  changed_when: "'0 upgraded' not in (fix_broken.stdout | default(''))"
  when: ansible_os_family == "Debian"

# ------------------------------
# 4. Refresh package metadata
# ------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Refresh DNF metadata
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_os_family == "RedHat"

- name: Refresh zypper repositories
  ansible.builtin.command: zypper --gpg-auto-import-keys refresh
  changed_when: false
  when: ansible_os_family == "Suse"

# ------------------------------
# 5. Ensure kernel tracking package exists
# ------------------------------
- name: Ensure Ubuntu kernel meta-package exists
  ansible.builtin.apt:
    name: linux-generic
    state: present
  when: ansible_distribution == "Ubuntu"

- name: Ensure kernel package is present (RHEL)
  ansible.builtin.package:
    name: kernel
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure kernel-default package is present (SUSE)
  ansible.builtin.package:
    name: kernel-default
    state: present
  when: ansible_os_family == "Suse"

# ------------------------------
# 6. Capture baseline kernel
# ------------------------------
- name: Capture running kernel baseline
  ansible.builtin.set_fact:
    running_kernel: "{{ ansible_kernel }}"

# ------------------------------
# 7. Capture installed kernels
# ------------------------------
- name: Get installed kernels (Debian)
  ansible.builtin.shell: |
    dpkg -l 'linux-image-*' 2>/dev/null | awk '/^ii/ {print $2}'
  args:
    executable: /bin/bash
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Get installed kernels (RedHat)
  ansible.builtin.command: rpm -q kernel
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "RedHat"

- name: Get installed kernels (SUSE)
  ansible.builtin.command: rpm -q kernel-default
  register: installed_kernels
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Suse"

# ------------------------------
# 8. Store baseline facts
# ------------------------------
- name: Store precheck baseline
  ansible.builtin.set_fact:
    precheck_result:
      host: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      kernel_before: "{{ ansible_kernel }}"

# ------------------------------
# 9. Precheck summary
# ------------------------------
- name: Show precheck summary
  ansible.builtin.debug:
    msg: |
      Precheck completed on {{ inventory_hostname }}

      OS             : {{ ansible_distribution }} {{ ansible_distribution_version }}
      Running Kernel : {{ running_kernel }}
      Root Free      : {{ root_free_gb }}GB
      Boot Free      : {{ boot_free_gb }}GB

      Installed Kernels:
      {{ installed_kernels.stdout | default('Not detected') }}
