---
- name: Show patch start
  debug:
    msg: "Starting patch on {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"

- name: Capture current kernel
  ansible.builtin.command:
    cmd: uname -r
  register: old_kernel
  changed_when: false

- name: Initialize patch_result
  set_fact:
    patch_result:
      host: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      old_kernel: "{{ old_kernel.stdout }}"
      new_kernel: ""
      updated: false
      reboot: false
      status: "Started"

# ------------------------------
# Cleanup /boot by removing old kernels
# ------------------------------
- name: Clean /boot - remove old kernels (Debian/Ubuntu)
  ansible.builtin.shell: |
    current=$(uname -r)
    packages=$(dpkg -l 'linux-image-*' 2>/dev/null \
      | awk '/^ii/{print $2}' \
      | grep -v "$current" \
      | sort -V)
    to_remove=$(echo "$packages" | head -n -1)
    if [ ! -z "$to_remove" ]; then
      apt-get -y purge $to_remove || true
    fi
  when: ansible_os_family == "Debian"

- name: Clean /boot - remove old kernels (RHEL family)
  ansible.builtin.shell: |
    rpm -q kernel | sort -V | head -n -2 | xargs -r yum -y remove
  when: ansible_os_family == "RedHat"

- name: Clean /boot - remove old kernels (SUSE)
  ansible.builtin.shell: |
    zypper --non-interactive se -s kernel | awk '/i/{print $3}' | sort -V | head -n -2 | xargs -r zypper --non-interactive rm
  when: ansible_os_family == "Suse"

- name: Show /boot cleanup complete
  debug:
    msg: "/boot old kernels removed successfully on {{ inventory_hostname }}"

# ------------------------------
# Check disk space after /boot cleanup
# ------------------------------
- name: Check free space on / /usr /var /boot (in GB)
  ansible.builtin.command:
    cmd: df -BG --output=target,avail
  register: disk_space
  changed_when: false

- name: Parse free space
  set_fact:
    free_space: >-
      {{
        dict(
          disk_space.stdout_lines[1:] 
          | map('split') 
          | map('reverse') 
          | map('map', 'regex_replace', 'G','') 
          | map('map','int') 
          | map('reverse') 
          | map('list') 
          | list
        )
      }}

- name: Fail if /, /usr, /var have less than 5GB free
  fail:
    msg: "Partition {{ item.key }} has less than 5GB free ({{ item.value }} GB), cannot continue patching!"
  loop: "{{ free_space | dict2items }}"
  when: item.key in ['/', '/usr', '/var'] and item.value < 5

- name: Show disk space check passed
  debug:
    msg: "Sufficient disk space available on {{ inventory_hostname }}"
