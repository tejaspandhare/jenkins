---
# ------------------------------
# 1. Gather disk usage
# ------------------------------
- name: Gather disk usage for /boot, /, /usr, /var
  ansible.builtin.shell: df -BG / /usr /var /boot | tail -n +2
  register: disk_usage
  changed_when: false

- name: Fail if critical partitions have less than required free space
  ansible.builtin.fail:
    msg: "Partition {{ item[5] }} has less than required free space ({{ item[3] }})"
  loop: "{{ disk_usage.stdout_lines | map('split') | list }}"
  loop_control:
    label: "{{ item[5] }}"
  when: >
    (item[5] == '/boot' and (item[3] | regex_replace('G','') | int < 1)) or
    (item[5] in ['/','/usr','/var'] and (item[3] | regex_replace('G','') | int < 5))

# ------------------------------
# 2. Fix broken packages
# ------------------------------
- name: Fix broken dependencies (Debian/Ubuntu)
  ansible.builtin.shell: apt-get -f install -y
  register: fix_broken
  changed_when: false
  when: ansible_os_family == "Debian"

# ------------------------------
# 3. Update cache
# ------------------------------
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
  when: ansible_os_family == "Debian"

# ------------------------------
# 4. Clean old kernels safely
# ------------------------------
- name: Remove old kernels safely (Debian/Ubuntu)
  ansible.builtin.shell: |
    set -o pipefail
    dpkg -l 'linux-image-*' \
    | awk '/^ii/{ print $2 }' \
    | grep -v "$(uname -r)" \
    | sort -V \
    | head -n -2 \
    | xargs -r apt-get -y purge
  args:
    executable: /bin/bash
  when: ansible_os_family == "Debian"

# ------------------------------
# 5. Autoremove
# ------------------------------
- name: Autoremove unused packages
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  when: ansible_os_family == "Debian"

# ------------------------------
# 6. Capture running kernel baseline
# ------------------------------
- name: Capture running kernel
  ansible.builtin.set_fact:
    running_kernel: "{{ ansible_kernel }}"
