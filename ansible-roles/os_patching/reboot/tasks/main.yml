- name: Capture new kernel
  command: uname -r
  register: new_kernel
  changed_when: false

- name: Detect kernel change
  set_fact:
    reboot_required: "{{ old_kernel.stdout != new_kernel.stdout }}"

- name: Reboot server
  reboot:
    reboot_timeout: 600
  when: reboot_required

- name: Wait for connection
  wait_for_connection:
    delay: 10
    timeout: 300
  when: reboot_required
