---

- name: Check if reboot required
  set_fact:
    reboot_required: "{{ upgrade_result.changed | default(false) }}"

- name: Reboot server if required
  reboot:
    reboot_timeout: 600
  when: reboot_required

- name: Wait for connection after reboot
  wait_for_connection:
    delay: 10
    timeout: 300
  when: reboot_required
