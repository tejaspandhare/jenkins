---
# ------------------------------
# Get latest installed kernel
# ------------------------------
- name: Get latest installed kernel (Debian/Ubuntu)
  shell: |
    dpkg -l 'linux-image-*' \
    | awk '/^ii/{ print $2 }' \
    | sed 's/linux-image-//' \
    | sort -V \
    | tail -n 1
  args:
    executable: /bin/bash
  register: latest_kernel
  changed_when: false
  when: ansible_os_family == "Debian"

# ------------------------------
# Decide reboot ONLY on kernel change
# ------------------------------
- name: Determine reboot requirement
  set_fact:
    reboot_required: "{{ latest_kernel.stdout != running_kernel }}"

# ------------------------------
# Debug info
# ------------------------------
- name: Show reboot decision
  debug:
    msg: |
      Running kernel : {{ running_kernel }}
      Installed kernel: {{ latest_kernel.stdout }}
      Reboot required: {{ reboot_required }}

# ------------------------------
# Reboot if needed
# ------------------------------
- name: Reboot system if kernel updated
  reboot:
    reboot_timeout: 900
  when: reboot_required

- name: Wait for system
  wait_for_connection:
    delay: 10
    timeout: 300
  when: reboot_required

# ------------------------------
# Update patch_result
# ------------------------------
- name: Update reboot flag
  set_fact:
    patch_result: "{{ patch_result | combine({'reboot': reboot_required}) }}"
