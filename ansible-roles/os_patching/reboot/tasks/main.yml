---
# ------------------------------
# 1. Determine reboot requirement (FIXED)
# ------------------------------
- name: Determine reboot requirement
  set_fact:
    reboot_required: "{{ patch_result.new_kernel != patch_result.old_kernel }}"

# ------------------------------
# 2. Show decision
# ------------------------------
- name: Show reboot decision
  debug:
    msg: |
      Running kernel : {{ patch_result.old_kernel }}
      Installed kernel: {{ patch_result.new_kernel }}
      Reboot required: {{ reboot_required }}

# ------------------------------
# 3. Reboot if needed
# ------------------------------
- name: Reboot system if kernel updated
  reboot:
    reboot_timeout: 900
  when: reboot_required

- name: Wait for system to come back
  wait_for_connection:
    delay: 10
    timeout: 300
  when: reboot_required

# ------------------------------
# 4. Update patch_result reboot flag
# ------------------------------
- name: Update patch_result reboot flag
  set_fact:
    patch_result: "{{ patch_result | combine({'reboot': reboot_required}) }}"
