# Debian reboot check
- name: Check reboot required (Debian)
  stat:
    path: /var/run/reboot-required
  register: debian_reboot
  when: ansible_os_family == "Debian"

# RHEL reboot check
- name: Check reboot required (RHEL)
  command: needs-restarting -r
  register: rhel_reboot
  failed_when: false
  changed_when: false
  when: ansible_os_family == "RedHat"

# SUSE reboot check
- name: Check reboot required (SUSE)
  command: zypper ps -s
  register: suse_reboot
  changed_when: false
  when: ansible_os_family == "Suse"

# Decide reboot
- name: Set reboot_required
  set_fact:
    reboot_required: >-
      {{
        (ansible_os_family == "Debian" and debian_reboot.stat.exists)
        or
        (ansible_os_family == "RedHat" and rhel_reboot.rc != 0)
        or
        (ansible_os_family == "Suse" and 'reboot' in suse_reboot.stdout | lower)
      }}

# Show reboot decision
- name: Show reboot decision
  debug:
    msg: "Reboot required on {{ inventory_hostname }}: {{ reboot_required }}"

# Reboot if needed
- name: Reboot system if required
  reboot:
    reboot_timeout: 900
  when: reboot_required

- name: Wait for system to come back
  wait_for_connection:
    delay: 10
    timeout: 300
  when: reboot_required

# Update patch_result
- name: Update patch_result reboot flag
  set_fact:
    patch_result: "{{ patch_result | combine({'reboot': reboot_required}) }}"
