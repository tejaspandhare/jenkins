---
- name: Full System + Sudo User Enterprise Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: yes
  become: yes

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    ########################################################
    # SYSTEM INFORMATION
    ########################################################

    - name: Get last patch date (Debian/Ubuntu)
      shell: "stat -c %y /var/lib/dpkg/status | awk '{print $1}' 2>/dev/null || echo 'N/A'"
      register: last_patch
      changed_when: false

    - name: Set system info safely
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count | default('N/A')) }}"
          ram_total: "{{ ansible_memtotal_mb | default('N/A') }} MB"
          ram_used: >-
            {% if ansible_memavailable_mb is defined %}
              {{ ansible_memtotal_mb - ansible_memavailable_mb }} MB
            {% else %}
              N/A
            {% endif %}
          uptime_days: "{{ (ansible_uptime_seconds | default(0) // 86400) }}"
          last_patch: "{{ last_patch.stdout }}"

    ########################################################
    # DISK INFO
    ########################################################

    - name: Reset disk info per host execution
      set_fact:
        disk_info: []

    - name: Build disk info list with usage %
      set_fact:
        disk_info: >-
          {{
            disk_info + [{
              'mount': item.mount,
              'size': ((item.size_total/1024/1024/1024)|round(2)) ~ ' GB',
              'usage': (((100 * (item.size_total - item.size_available) / item.size_total) | round(1)) if item.size_total > 0 else 0) ~ '%'
            }]
          }}
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs','devtmpfs','overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet')

    ########################################################
    # USER FILTERING
    ########################################################

    - name: Read /etc/passwd
      slurp:
        src: /etc/passwd
      register: passwd_file
      changed_when: false

    - name: Parse passwd entries
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({ item.0: {'uid': item.2, 'gid': item.3, 'home': item.5, 'shell': item.6} }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read /etc/group
      slurp:
        src: /etc/group
      register: group_file
      changed_when: false

    - name: Parse group entries
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({ item.0: {'gid': item.2, 'members': item.3} }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Build valid local users list (UID >= 1000 OR root UID 0)
      set_fact:
        valid_users: "{{ valid_users + [ item.key ] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - (item.value.uid | int >= 1000 or item.value.uid | int == 0)
        - item.key != "nobody"

    - name: Build sudo group users list
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members.split(',') if 'sudo' in getent_group else []) +
            (getent_group['wheel'].members.split(',') if 'wheel' in getent_group else []) +
            ['root']
          }}

    - name: Keep only sudo users
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users | default([])) }}"

    ########################################################
    # COLLECT USER DETAILS WITH 30-DAY HISTORICAL SOURCE IPS
    ########################################################

    - name: Collect sudo user details and remote source IPs (Last 30 Days)
      shell: |
        # Get baseline last login timestamp safely
        LASTLOGIN=$(lastlog -u {{ item }} | tail -1 | awk '{$1=$2=$3=""; print $0}' | xargs)
        if [ -z "$LASTLOGIN" ] || echo "$LASTLOGIN" | grep -q "Never logged"; then
            LASTLOGIN="Never logged in"
        fi

        # Extract IPs from 'last -i' command
        IPS_LAST=$(last -i {{ item }} | awk '
          /^[a-zA-Z0-9]/ && !/system boot/ && !/0.0.0.0/ {
            if ($3 ~ /[0-9]/ && $3 !~ /^pts/) print $3
          }
        ')

        # Fallback to scan /var/log/auth.log for accepted connections matching this user
        IPS_AUTH=""
        if [ -f /var/log/auth.log ]; then
            IPS_AUTH=$(grep -E "Accepted password|Accepted publickey" /var/log/auth.log | grep "for {{ item }}" | awk '{for(i=1;i<=NF;i++) if($i=="from") print $(i+1)}' | sort -u)
        fi

        # Combined extraction using printf instead of echo to drop flag anomalies
        SRC_IPS=$(printf "%s\n%s" "${IPS_LAST}" "${IPS_AUTH}" | grep -E '[0-9]+\.[0-9]+' | sort -u | tr '\n' ',' | sed 's/,$//' | sed 's/^,//')

        if [ -z "$SRC_IPS" ]; then
            SRC_IPS="Local/Internal Only"
        fi

        GROUPS=$(id -nG {{ item }})
        PASSLAST=$(chage -l {{ item }} | grep "Last password change" | cut -d: -f2 | xargs)
        PASSMAX=$(chage -l {{ item }} | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)
        
        echo "{{ inventory_hostname }}|{{ item }}|$LASTLOGIN|$SRC_IPS|$GROUPS|Last Change: $PASSLAST, Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: yes

    - name: Store user report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    ########################################################
    # CLEAN OLD REPORTS (JENKINS WORKSPACE)
    ########################################################

    - name: Remove old report files
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    ########################################################
    # GENERATE REPORTS
    ########################################################

    - name: Generate TXT report (Markdown Tables for Jenkins Console)
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.txt"
        content: |
          # ENTERPRISE INFRASTRUCTURE AUDIT SUMMARY REPORT

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          ## NODE TOPOLOGY: {{ sys.host }}

          ### [1] SYSTEM METRICS TABLE
          | Operating System | Kernel Version | Machine Type | CPU Cores | RAM Total | RAM Used | Uptime | Last Patch Date |
          | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |
          | {{ sys.os }} | {{ sys.kernel }} | {{ sys.machine_type }} | {{ sys.cpu }} vCPUs | {{ sys.ram_total }} | {{ sys.ram_used }} | {{ sys.uptime_days }} Days | {{ sys.last_patch }} |

          ### [2] FILESYSTEMS TOPOLOGY TABLE
          | Mount Point | Total Capacity Size | Current Disk Utilization |
          | :--- | :--- | :--- |
          {% for disk in hostvars[host].disk_info | default([]) %}
          | {{ disk.mount }} | {{ disk.size }} | {{ disk.usage }} |
          {% endfor %}

          ### [3] PRIVILEGED ACCOUNTS & SUDO METRICS TABLE (LAST 30 DAYS CONNECTIONS)
          | User Account | Source Connection IP(s) | Last Login Timestamp | Assigned Security Groups | Password Aging Metadata |
          | :--- | :--- | :--- | :--- | :--- |
          {% if hostvars[host].final_users | length == 0 %}
          | N/A | N/A | No privileged administrative users found | N/A | N/A |
          {% else %}
          {% for line in hostvars[host].report_data | default([]) %}
          {% set cols = line.split('|') %}
          | **{{ cols[1] }}** | `{{ cols[3] }}` | {{ cols[2] }} | {{ cols[4] }} | {{ cols[5] }} |
          {% endfor %}
          {% endif %}

          ------------------------------------------------------------------------------------------------------------------------
          {% endfor %}

    - name: Generate CSV report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.csv"
        content: |
          Host,OS,Kernel,Machine,CPU,RAM_Total,RAM_Used,Uptime_days,Last_Patch
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          {{ sys.host }},{{ sys.os }},{{ sys.kernel }},{{ sys.machine_type }},{{ sys.cpu }},{{ sys.ram_total }},{{ sys.ram_used }},{{ sys.uptime_days }},{{ sys.last_patch }}
          {% endfor %}

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head>
          <title>Full System Audit Report</title>
          </head>
          <body>
          <h2>Full Enterprise Infrastructure Audit Report</h2>
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          <h3>Node Topology: {{ sys.host }}</h3>
          <h4>System Metrics Table</h4>
          <table border="1" cellpadding="5" cellspacing="0">
            <tr bgcolor="#f2f2f2">
              <th>Operating System</th><th>Kernel Version</th><th>Machine Type</th><th>CPU Cores</th><th>RAM Total</th><th>RAM Used</th><th>Uptime</th><th>Last Patch Date</th>
            </tr>
            <tr>
              <td>{{ sys.os }}</td><td>{{ sys.kernel }}</td><td>{{ sys.machine_type }}</td><td>{{ sys.cpu }} vCPUs</td><td>{{ sys.ram_total }}</td><td>{{ sys.ram_used }}</td><td>{{ sys.uptime_days }} Days</td><td>{{ sys.last_patch }}</td>
            </tr>
          </table>
          <h4>Filesystems Topology Table</h4>
          <table border="1" cellpadding="5" cellspacing="0">
            <tr bgcolor="#f2f2f2"><th>Mount Point</th><th>Total Capacity Size</th><th>Current Disk Utilization</th></tr>
            {% for disk in hostvars[host].disk_info | default([]) %}
            <tr><td>{{ disk.mount }}</td><td>{{ disk.size }}</td><td>{{ disk.usage }}</td></tr>
            {% endfor %}
          </table>
          <h4>Privileged Accounts & Sudo Metrics Table</h4>
          <table border="1" cellpadding="5" cellspacing="0">
            <tr bgcolor="#f2f2f2"><th>User Account</th><th>Source Connection IP(s)</th><th>Last Login Timestamp</th><th>Assigned Security Groups</th><th>Password Aging Metadata</th></tr>
            {% for line in hostvars[host].report_data | default([]) %}
            {% set cols = line.split('|') %}
            <tr><td><b>{{ cols[1] }}</b></td><td><code>{{ cols[3] }}</code></td><td>{{ cols[2] }}</td><td>{{ cols[4] }}</td><td>{{ cols[5] }}</td></tr>
            {% endfor %}
          </table>
          {% endfor %}
          </body>
          </html>
