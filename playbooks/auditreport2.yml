---
- name: Full System + Sudo User Enterprise Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: yes
  become: yes

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    ########################################################
    # SYSTEM INFORMATION
    ########################################################

    - name: Get last patch date (Debian/Ubuntu)
      shell: "stat -c %y /var/lib/dpkg/status | awk '{print $1}' 2>/dev/null || echo 'N/A'"
      register: last_patch
      changed_when: false

    - name: Set system info safely
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count | default('N/A')) }}"
          ram_total: "{{ ansible_memtotal_mb | default('N/A') }} MB"
          ram_used: >-
            {% if ansible_memavailable_mb is defined %}
              {{ ansible_memtotal_mb - ansible_memavailable_mb }} MB
            {% else %}
              N/A
            {% endif %}
          uptime_days: "{{ (ansible_uptime_seconds | default(0) // 86400) }}"
          last_patch: "{{ last_patch.stdout }}"

    ########################################################
    # DISK INFO (Fixed N/A% calculation bug)
    ########################################################

    - name: Reset disk info per host execution
      set_fact:
        disk_info: []

    - name: Build disk info list with usage %
      set_fact:
        disk_info: >-
          {{
            disk_info + [
              item.mount ~ ' (' ~ ((item.size_total/1024/1024/1024)|round(2)) ~ ' GB, ' ~
              (((100 * (item.size_total - item.size_available) / item.size_total) | round(1)) if item.size_total > 0 else 0) ~ '%)'
            ]
          }}
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs','devtmpfs','overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet') # Exclude noisy K8s ephemeral mount paths

    ########################################################
    # USER FILTERING (Includes root and admins)
    ########################################################

    - name: Read /etc/passwd
      slurp:
        src: /etc/passwd
      register: passwd_file
      changed_when: false

    - name: Parse passwd entries
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({ item.0: {'uid': item.2, 'gid': item.3, 'home': item.5, 'shell': item.6} }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read /etc/group
      slurp:
        src: /etc/group
      register: group_file
      changed_when: false

    - name: Parse group entries
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({ item.0: {'gid': item.2, 'members': item.3} }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Build valid local users list (UID >= 1000 OR root UID 0)
      set_fact:
        valid_users: "{{ valid_users + [ item.key ] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - (item.value.uid | int >= 1000 or item.value.uid | int == 0)
        - item.key != "nobody"

    - name: Build sudo group users list
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members.split(',') if 'sudo' in getent_group else []) +
            (getent_group['wheel'].members.split(',') if 'wheel' in getent_group else []) +
            ['root']
          }}

    - name: Keep only sudo users (Intersection including root)
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users | default([])) }}"

    ########################################################
    # COLLECT USER DETAILS WITH SOURCE IP
    ########################################################

    - name: Collect sudo user details and remote source IPs
      shell: |
        # Safely capture fields from lastlog
        RAW_LAST=$(lastlog -u {{ item }} | tail -1)
        
        # Check if user has ever logged in
        if echo "$RAW_LAST" | grep -q "**Never logged in**"; then
            LASTLOGIN="Never logged in"
            SRC_IP="N/A"
        else
            # Extract Source IP/Host (Column 3) and Timestamp (Remaining text)
            SRC_IP=$(echo "$RAW_LAST" | awk '{print $3}')
            LASTLOGIN=$(echo "$RAW_LAST" | awk '{$1=$2=$3=""; print $0}' | xargs)
        fi
        
        GROUPS=$(id -nG {{ item }})
        PASSLAST=$(chage -l {{ item }} | grep "Last password change" | cut -d: -f2 | xargs)
        PASSMAX=$(chage -l {{ item }} | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)
        
        echo "{{ inventory_hostname }}|{{ item }}|$LASTLOGIN|$SRC_IP|$GROUPS|Last Change: $PASSLAST|Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: yes

    - name: Store user report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    ########################################################
    # CLEAN OLD REPORTS (JENKINS WORKSPACE)
    ########################################################

    - name: Remove old report files
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    ########################################################
    # GENERATE REPORTS
    ########################################################

    - name: Generate TXT report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.txt"
        content: |
          ================= FULL SYSTEM AUDIT REPORT =================

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          ------------------------------------------------------------
          Host: {{ sys.host }}
          OS: {{ sys.os }}
          Kernel: {{ sys.kernel }}
          Machine Type: {{ sys.machine_type }}
          CPU Cores: {{ sys.cpu }}
          RAM Total: {{ sys.ram_total }}
          RAM Used: {{ sys.ram_used }}
          Uptime (days): {{ sys.uptime_days }}
          Last Patch: {{ sys.last_patch }}

          Filesystems:
          {% for disk in hostvars[host].disk_info | default([]) %}
            - {{ disk }}
          {% endfor %}

          SUDO USERS & PRIVILEGED ACCESS:
          {% if hostvars[host].final_users | length == 0 %}
            No privileged users found
          {% else %}
            {% for line in hostvars[host].report_data | default([]) %}
            {% set cols = line.split('|') %}
            User: {{ cols[1] }}, Src IP: {{ cols[3] }}, Last Login: {{ cols[2] }}, Groups: {{ cols[4] }}, {{ cols[5] }} {{ cols[6] }}
            {% endfor %}
          {% endif %}

          ============================================================
          {% endfor %}

    - name: Generate CSV report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.csv"
        content: |
          Host,OS,Kernel,Machine,CPU,RAM_Total,RAM_Used,Uptime_days,Last_Patch
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          {{ sys.host }},{{ sys.os }},{{ sys.kernel }},{{ sys.machine_type }},{{ sys.cpu }},{{ sys.ram_total }},{{ sys.ram_used }},{{ sys.uptime_days }},{{ sys.last_patch }}
          {% endfor %}

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head>
          <title>Full System Audit Report</title>
          <style>
            body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
            table { border-collapse: collapse; width: 100%; margin-bottom: 25px; box-shadow: 0 2px 3px rgba(0,0,0,0.1); background: #fff; }
            th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: left; }
            th { background-color: #004085; color: white; }
            tr:nth-child(even) { background-color: #f2f4f8; }
            h3 { color: #004085; margin-top: 35px; border-bottom: 2px solid #004085; padding-bottom: 5px; }
            .root-highlight { color: #d9534f; font-weight: bold; }
          </style>
          </head>
          <body>
          <h2>Full Enterprise Infrastructure Audit Report</h2>

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          <h3>Node: {{ sys.host }}</h3>
          <ul>
            <li><strong>OS:</strong> {{ sys.os }}</li>
            <li><strong>Kernel:</strong> {{ sys.kernel }}</li>
            <li><strong>Machine Type:</strong> {{ sys.machine_type }}</li>
            <li><strong>CPU Cores:</strong> {{ sys.cpu }}</li>
            <li><strong>RAM Total:</strong> {{ sys.ram_total }}</li>
            <li><strong>RAM Used:</strong> {{ sys.ram_used }}</li>
            <li><strong>Uptime (days):</strong> {{ sys.uptime_days }}</li>
            <li><strong>Last Patch:</strong> {{ sys.last_patch }}</li>
          </ul>

          <h4>Filesystems Topology</h4>
          <ul>
          {% for disk in hostvars[host].disk_info | default([]) %}
            <li>{{ disk }}</li>
          {% endfor %}
          </ul>

          <h4>Privileged Accounts & Sudo Metrics</h4>
          <table>
          <tr>
            <th>User Account</th>
            <th>Source Connection IP</th>
            <th>Last Login Timestamp</th>
            <th>Assigned Security Groups</th>
            <th>Password Aging Metadata</th>
          </tr>
          {% if hostvars[host].final_users | length == 0 %}
          <tr><td colspan="5">No privileged administrative users mapped</td></tr>
          {% else %}
          {% for line in hostvars[host].report_data | default([]) %}
          {% set cols = line.split('|') %}
          <tr>
            <td>
              <span class="{{ 'root-highlight' if cols[1] == 'root' else '' }}">
                {{ cols[1] }}
              </span>
            </td>
            <td><code>{{ cols[3] }}</code></td>
            <td>{{ cols[2] }}</td>
            <td><small>{{ cols[4] }}</small></td>
            <td><small>{{ cols[5] }}<br>{{ cols[6] }}</small></td>
          </tr>
          {% endfor %}
          {% endif %}
          </table>
          <hr>
          {% endfor %}
          </body>
          </html>
