---
- name: Full System + Sudo User Enterprise Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: yes
  become: yes

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    ########################################################
    # SYSTEM INFORMATION
    ########################################################

    - name: Get last patch date (Debian/Ubuntu)
      shell: "stat -c %y /var/lib/dpkg/status | awk '{print $1}' 2>/dev/null || echo 'N/A'"
      register: last_patch
      changed_when: false

    - name: Set system info safely
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count | default('N/A')) }}"
          ram_total: "{{ ansible_memtotal_mb | default('N/A') }} MB"
          ram_used: >-
            {% if ansible_memavailable_mb is defined %}
              {{ ansible_memtotal_mb - ansible_memavailable_mb }} MB
            {% else %}
              N/A
            {% endif %}
          uptime_days: "{{ (ansible_uptime_seconds | default(0) // 86400) }}"
          last_patch: "{{ last_patch.stdout }}"

    ########################################################
    # DISK INFO
    ########################################################

    - name: Reset disk info per host execution
      set_fact:
        disk_info: []

    - name: Build disk info list with usage %
      set_fact:
        disk_info: >-
          {{
            disk_info + [{
              'mount': item.mount,
              'size': ((item.size_total/1024/1024/1024)|round(2)) ~ ' GB',
              'usage': (((100 * (item.size_total - item.size_available) / item.size_total) | round(1)) if item.size_total > 0 else 0) ~ '%'
            }]
          }}
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs','devtmpfs','overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet')

    ########################################################
    # USER FILTERING
    ########################################################

    - name: Read /etc/passwd
      slurp:
        src: /etc/passwd
      register: passwd_file
      changed_when: false

    - name: Parse passwd entries
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({ item.0: {'uid': item.2, 'gid': item.3, 'home': item.5, 'shell': item.6} }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read /etc/group
      slurp:
        src: /etc/group
      register: group_file
      changed_when: false

    - name: Parse group entries
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({ item.0: {'gid': item.2, 'members': item.3} }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Build valid local users list (UID >= 1000 OR root UID 0)
      set_fact:
        valid_users: "{{ valid_users + [ item.key ] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - (item.value.uid | int >= 1000 or item.value.uid | int == 0)
        - item.key != "nobody"

    - name: Build sudo group users list
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members.split(',') if 'sudo' in getent_group else []) +
            (getent_group['wheel'].members.split(',') if 'wheel' in getent_group else []) +
            ['root']
          }}

    - name: Keep only sudo users
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users | default([])) }}"

    ########################################################
    # COLLECT USER DETAILS WITH SOURCE IP
    ########################################################

    - name: Collect sudo user details and remote source IPs
      shell: |
        RAW_LAST=$(lastlog -u {{ item }} | tail -1)
        
        if echo "$RAW_LAST" | grep -q "**Never logged in**"; then
            LASTLOGIN="Never logged in"
            SRC_IP="N/A"
        else
            SRC_IP=$(echo "$RAW_LAST" | awk '{print $3}')
            LASTLOGIN=$(echo "$RAW_LAST" | awk '{$1=$2=$3=""; print $0}' | xargs)
        fi
        
        GROUPS=$(id -nG {{ item }})
        PASSLAST=$(chage -l {{ item }} | grep "Last password change" | cut -d: -f2 | xargs)
        PASSMAX=$(chage -l {{ item }} | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)
        
        echo "{{ inventory_hostname }}|{{ item }}|$LASTLOGIN|$SRC_IP|$GROUPS|Last Change: $PASSLAST|Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: yes

    - name: Store user report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    ########################################################
    # CLEAN OLD REPORTS (JENKINS WORKSPACE)
    ########################################################

    - name: Remove old report files
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    ########################################################
    # GENERATE REPORTS
    ########################################################

    - name: Generate TXT report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.txt"
        content: |
          ================= FULL SYSTEM AUDIT REPORT =================

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          ------------------------------------------------------------
          Host: {{ sys.host }}
          OS: {{ sys.os }} | Kernel: {{ sys.kernel }} | Type: {{ sys.machine_type }}
          CPU Cores: {{ sys.cpu }} | RAM Total: {{ sys.ram_total }} | RAM Used: {{ sys.ram_used }}
          Uptime: {{ sys.uptime_days }} days | Last Patch: {{ sys.last_patch }}

          Filesystems:
          {% for disk in hostvars[host].disk_info | default([]) %}
            - {{ disk.mount }} ({{ disk.size }}, {{ disk.usage }})
          {% endfor %}

          SUDO USERS & PRIVILEGED ACCESS:
          {% if hostvars[host].final_users | length == 0 %}
            No privileged users found
          {% else %}
            {% for line in hostvars[host].report_data | default([]) %}
            {% set cols = line.split('|') %}
            User: {{ cols[1] }}, Src IP: {{ cols[3] }}, Last Login: {{ cols[2] }}, Groups: {{ cols[4] }}, {{ cols[5] }} {{ cols[6] }}
            {% endfor %}
          {% endif %}

          ============================================================
          {% endfor %}

    - name: Generate CSV report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.csv"
        content: |
          Host,OS,Kernel,Machine,CPU,RAM_Total,RAM_Used,Uptime_days,Last_Patch
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          {{ sys.host }},{{ sys.os }},{{ sys.kernel }},{{ sys.machine_type }},{{ sys.cpu }},{{ sys.ram_total }},{{ sys.ram_used }},{{ sys.uptime_days }},{{ sys.last_patch }}
          {% endfor %}

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head>
          <title>Full System Audit Report</title>
          <style>
            body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
            h2 { color: #002b5c; border-bottom: 3px solid #002b5c; padding-bottom: 10px; }
            h3 { color: #0056b3; margin-top: 40px; background: #e9ecef; padding: 10px; border-left: 5px solid #0056b3; }
            h4 { color: #495057; margin-top: 20px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #dee2e6; padding-bottom: 5px; }
            table { border-collapse: collapse; width: 100%; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); background: #fff; border-radius: 4px; overflow: hidden; }
            th, td { padding: 12px 15px; text-align: left; border: 1px solid #dee2e6; }
            th { background-color: #002b5c; color: white; font-weight: 600; }
            tr:nth-child(even) { background-color: #f8f9fa; }
            tr:hover { background-color: #f1f3f5; }
            code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-family: Consolas, monospace; font-size: 0.9em; }
            .root-highlight { color: #d9534f; font-weight: bold; background: #fdf2f2; padding: 3px 8px; border-radius: 4px; border: 1px solid #f5c6cb; }
          </style>
          </head>
          <body>
          <h2>Full Enterprise Infrastructure Audit Report</h2>

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          <h3>Node Topology: {{ sys.host }}</h3>
          
          <h4>System Metrics Table</h4>
          <table>
            <tr>
              <th>Operating System</th>
              <th>Kernel Version</th>
              <th>Machine Type</th>
              <th>CPU Cores</th>
              <th>RAM Total</th>
              <th>RAM Used</th>
              <th>Uptime</th>
              <th>Last Patch Date</th>
            </tr>
            <tr>
              <td>{{ sys.os }}</td>
              <td><code>{{ sys.kernel }}</code></td>
              <td>{{ sys.machine_type }}</td>
              <td>{{ sys.cpu }} vCPUs</td>
              <td>{{ sys.ram_total }}</td>
              <td>{{ sys.ram_used }}</td>
              <td>{{ sys.uptime_days }} Days</td>
              <td>{{ sys.last_patch }}</td>
            </tr>
          </table>

          <h4>Filesystems Topology Table</h4>
          <table>
            <tr>
              <th>Mount Point</th>
              <th>Total Capacity Size</th>
              <th>Current Disk Utilization</th>
            </tr>
            {% for disk in hostvars[host].disk_info | default([]) %}
            <tr>
              <td><code>{{ disk.mount }}</code></td>
              <td>{{ disk.size }}</td>
              <td><strong>{{ disk.usage }}</strong></td>
            </tr>
            {% endfor %}
          </table>

          <h4>Privileged Accounts & Sudo Metrics Table</h4>
          <table>
            <tr>
              <th>User Account</th>
              <th>Source Connection IP</th>
              <th>Last Login Timestamp</th>
              <th>Assigned Security Groups</th>
              <th>Password Aging Metadata</th>
            </tr>
            {% if hostvars[host].final_users | length == 0 %}
            <tr><td colspan="5" style="text-align: center; color: #6c757d;">No privileged administrative users mapped</td></tr>
            {% else %}
            {% for line in hostvars[host].report_data | default([]) %}
            {% set cols = line.split('|') %}
            <tr>
              <td>
                {% if cols[1] == 'root' %}
                <span class="root-highlight">{{ cols[1] }}</span>
                {% else %}
                <strong>{{ cols[1] }}</strong>
                {% endif %}
              </td>
              <td><code>{{ cols[3] }}</code></td>
              <td>{{ cols[2] }}</td>
              <td><small>{{ cols[4] }}</small></td>
              <td><small>{{ cols[5] }}<br>{{ cols[6] }}</small></td>
            </tr>
            {% endfor %}
            {% endif %}
          </table>
          {% endfor %}
          </body>
          </html>
