---
- name: Full System + Sudo User Enterprise Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: yes
  become: yes

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    - name: Get last patch date
      shell: "stat -c %y /var/lib/dpkg/status | awk '{print $1}' 2>/dev/null || echo 'N/A'"
      register: last_patch
      changed_when: false

    - name: Set system information
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count | default('N/A')) }}"
          ram_total: "{{ ansible_memtotal_mb }} MB"
          ram_used: "{{ ansible_memtotal_mb - ansible_memavailable_mb }} MB"
          uptime_days: "{{ (ansible_uptime_seconds | int / 86400) | round(0, 'floor') }}"
          last_patch: "{{ last_patch.stdout }}"

    - name: Reset disk info
      set_fact:
        disk_info: []

    - name: Build disk information
      set_fact:
        disk_info: >-
          {{
            disk_info + [{
              'mount': item.mount,
              'size': ((item.size_total / 1024 / 1024 / 1024) | round(2)) ~ ' GB',
              'usage': (
                ((100 * (item.size_total - item.size_available) / item.size_total)
                | round(1)) if item.size_total > 0 else 0
              ) ~ '%'
            }]
          }}
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs', 'devtmpfs', 'overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet')

    - name: Read passwd file
      slurp:
        src: /etc/passwd
      register: passwd_file
      changed_when: false

    - name: Parse passwd entries
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({ item.0: {'uid': item.2, 'gid': item.3, 'home': item.5, 'shell': item.6} }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read group file
      slurp:
        src: /etc/group
      register: group_file
      changed_when: false

    - name: Parse group entries
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({ item.0: {'gid': item.2, 'members': item.3} }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Build valid user list
      set_fact:
        valid_users: "{{ valid_users + [ item.key ] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - (item.value.uid | int >= 1000) or (item.value.uid | int == 0)
        - item.key != "nobody"

    - name: Build sudo users list
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members.split(',') if 'sudo' in getent_group else [])
            +
            (getent_group['wheel'].members.split(',') if 'wheel' in getent_group else [])
            +
            ['root']
          }}

    - name: Keep only privileged users
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users | default([])) }}"

    - name: Collect sudo user details
      shell: |
        LASTLOGIN=$(lastlog -u {{ item }} | tail -1 | awk '{$1=$2=$3=""; print $0}' | xargs)

        if [ -z "$LASTLOGIN" ] || echo "$LASTLOGIN" | grep -q "Never logged"; then
          LASTLOGIN="Never logged in"
        fi

        GROUPS=$(id -nG {{ item }})

        PASSLAST=$(chage -l {{ item }} | grep "Last password change" | cut -d: -f2 | xargs)
        PASSMAX=$(chage -l {{ item }} | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)

        echo "{{ item }}|$LASTLOGIN|$GROUPS|Last Change: $PASSLAST, Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: yes

    - name: Store report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    - name: Remove old reports
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head>
            <title>Enterprise Infrastructure Audit Report</title>
            <style>
              body { font-family: Arial, sans-serif; }
              table {
                border-collapse: collapse;
                width: 100%;
              }
              th, td {
                border: 1px solid #ddd;
                padding: 8px;
                vertical-align: top;
              }
              th {
                background-color: #4472C4;
                color: white;
              }
              tr:nth-child(even) {
                background-color: #f2f2f2;
              }
            </style>
          </head>
          <body>

          <h2>Enterprise Infrastructure Audit Report</h2>

          <table>
            <tr>
              <th>Host</th>
              <th>OS</th>
              <th>Kernel</th>
              <th>CPU</th>
              <th>RAM Used / Total</th>
              <th>Uptime</th>
              <th>Last Patch</th>
              <th>Filesystems</th>
              <th>Privileged Users</th>
            </tr>

            {% for host in ansible_play_hosts %}
            {% set sys = hostvars[host].system_info %}
            <tr>
              <td>{{ sys.host }}</td>
              <td>{{ sys.os }}</td>
              <td>{{ sys.kernel }}</td>
              <td>{{ sys.cpu }}</td>
              <td>{{ sys.ram_used }} / {{ sys.ram_total }}</td>
              <td>{{ sys.uptime_days }} Days</td>
              <td>{{ sys.last_patch }}</td>

              <td>
              {% for disk in hostvars[host].disk_info | default([]) %}
                {{ disk.mount }} - {{ disk.size }} - {{ disk.usage }}<br>
              {% endfor %}
              </td>

              <td>
              {% for line in hostvars[host].report_data | default([]) %}
                {% set cols = line.split('|') %}
                <b>{{ cols[0] }}</b><br>
                Last Login: {{ cols[1] }}<br>
                Groups: {{ cols[2] }}<br>
                {{ cols[3] }}<br><br>
              {% endfor %}
              </td>
            </tr>
            {% endfor %}

          </table>

          </body>
          </html>
