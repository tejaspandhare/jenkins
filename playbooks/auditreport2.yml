---
- name: Enterprise Linux Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: true
  become: true

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    #################################################################
    # SYSTEM INFORMATION
    #################################################################

    - name: Get last patch date
      shell: |
        if [ -f /var/lib/dpkg/status ]; then
          stat -c %y /var/lib/dpkg/status | awk '{print $1}'
        elif [ -f /var/lib/rpm/Packages ]; then
          stat -c %y /var/lib/rpm/Packages | awk '{print $1}'
        else
          echo "N/A"
        fi
      register: last_patch
      changed_when: false

    - name: Get human readable uptime
      shell: uptime -p | sed 's/^up //'
      register: precise_uptime
      changed_when: false

    - name: Build system info
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count) }}"
          ram_total: "{{ ansible_memtotal_mb }} MB"
          ram_used: "{{ ansible_memtotal_mb - ansible_memavailable_mb }} MB"
          uptime_days: "{{ (ansible_uptime_seconds // 86400) | int }}"
          uptime_human: "{{ precise_uptime.stdout }}"
          last_patch: "{{ last_patch.stdout }}"

    #################################################################
    # DISK INFORMATION
    #################################################################

    - name: Initialize disk list
      set_fact:
        disk_info: []

    - name: Build filesystem inventory
      set_fact:
        disk_info: "{{ disk_info + [ {
          'mount': item.mount,
          'size': ((item.size_total/1024/1024/1024)|round(2)) ~ ' GB',
          'usage': (((item.size_total-item.size_available)*100/item.size_total)|round(1)) ~ '%'
        } ] }}"
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs','devtmpfs','overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet')

    #################################################################
    # USER DISCOVERY
    #################################################################

    - name: Read passwd
      slurp:
        src: /etc/passwd
      register: passwd_file

    - name: Parse passwd
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({
          item.0: {
            'uid': item.2,
            'gid': item.3,
            'home': item.5,
            'shell': item.6
          }
        }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read groups
      slurp:
        src: /etc/group
      register: group_file

    - name: Parse groups
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({
          item.0: {
            'gid': item.2,
            'members': item.3
          }
        }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Collect valid users
      set_fact:
        valid_users: "{{ valid_users + [item.key] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - item.key != 'nobody'
        - (item.value.uid | int == 0) or (item.value.uid | int >= 1000)

    - name: Build sudo/wheel users
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members | default('') | split(',') | reject('equalto','') | list)
            +
            (getent_group['wheel'].members | default('') | split(',') | reject('equalto','') | list)
            +
            ['root']
          }}

    - name: Filter privileged users
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users) }}"

    #################################################################
    # USER AUDIT
    #################################################################

    - name: Gather privileged user details
      shell: |
        USER="{{ item }}"

        RAW=$(lastlog -u "$USER" | tail -1)

        if echo "$RAW" | grep -qi "Never logged"; then
          LASTLOGIN="Never logged in"
        else
          LASTLOGIN=$(echo "$RAW" | awk '{$1=$2=$3="";print $0}' | xargs)
        fi

        GROUPS=$(id -nG "$USER" 2>/dev/null)

        PASSLAST=$(chage -l "$USER" 2>/dev/null | grep "Last password change" | cut -d: -f2 | xargs)

        PASSMAX=$(chage -l "$USER" 2>/dev/null | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)

        echo "{{ inventory_hostname }}|$USER|$LASTLOGIN|$GROUPS|Last Change: $PASSLAST, Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: true

    - name: Store report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    #################################################################
    # CLEAN OLD REPORTS
    #################################################################

    - name: Remove old reports
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    #################################################################
    # TXT REPORT
    #################################################################

    - name: Generate TXT report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.txt"
        content: |
          ENTERPRISE LINUX AUDIT REPORT

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}

          HOST: {{ sys.host }}

          OS: {{ sys.os }}
          Kernel: {{ sys.kernel }}
          CPU: {{ sys.cpu }}
          RAM: {{ sys.ram_total }} (Used: {{ sys.ram_used }})
          Uptime: {{ sys.uptime_human }}
          Last Patch: {{ sys.last_patch }}

          FILESYSTEMS:
          {% for disk in hostvars[host].disk_info %}
          {{ disk.mount }}  {{ disk.size }}  {{ disk.usage }}
          {% endfor %}

          PRIVILEGED USERS:
          {% for line in hostvars[host].report_data %}
          {{ line }}
          {% endfor %}

          ------------------------------------------------------------
          {% endfor %}

    #################################################################
    # CSV REPORT
    #################################################################

    - name: Generate CSV report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.csv"
        content: |
          Host,OS,Kernel,CPU,RAM_Total,RAM_Used,Uptime,Last_Patch
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          {{ sys.host }},{{ sys.os }},{{ sys.kernel }},{{ sys.cpu }},{{ sys.ram_total }},{{ sys.ram_used }},{{ sys.uptime_human }},{{ sys.last_patch }}
          {% endfor %}

    #################################################################
    # HTML REPORT
    #################################################################

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head><title>Enterprise Audit Report</title></head>
          <body>

          <h1>Enterprise Linux Audit Report</h1>

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}

          <h2>{{ sys.host }}</h2>

          <table border="1">
            <tr>
              <th>OS</th><th>Kernel</th><th>CPU</th>
              <th>RAM</th><th>Uptime</th><th>Last Patch</th>
            </tr>
            <tr>
              <td>{{ sys.os }}</td>
              <td>{{ sys.kernel }}</td>
              <td>{{ sys.cpu }}</td>
              <td>{{ sys.ram_total }} / {{ sys.ram_used }}</td>
              <td>{{ sys.uptime_human }}</td>
              <td>{{ sys.last_patch }}</td>
            </tr>
          </table>

          <h3>Filesystems</h3>
          <table border="1">
            <tr><th>Mount</th><th>Size</th><th>Usage</th></tr>
            {% for disk in hostvars[host].disk_info %}
            <tr>
              <td>{{ disk.mount }}</td>
              <td>{{ disk.size }}</td>
              <td>{{ disk.usage }}</td>
            </tr>
            {% endfor %}
          </table>

          <h3>Privileged Users</h3>
          <table border="1">
            <tr><th>User Data</th></tr>
            {% for line in hostvars[host].report_data %}
            <tr><td>{{ line }}</td></tr>
            {% endfor %}
          </table>

          <hr>
          {% endfor %}

          </body>
          </html>
