---
- name: Full System + Sudo User Enterprise Audit Report
  hosts: "{{ hosts.split(';') }}"
  gather_facts: yes
  become: yes

  vars:
    valid_users: []
    final_users: []
    report_data: []

  tasks:

    ########################################################
    # SYSTEM INFORMATION
    ########################################################

    - name: Get last patch date (Debian/Ubuntu)
      shell: "stat -c %y /var/lib/dpkg/status | awk '{print $1}' 2>/dev/null || echo 'N/A'"
      register: last_patch
      changed_when: false

    - name: Set system info safely
      set_fact:
        system_info:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          machine_type: "{{ ansible_virtualization_type | default('physical') }}"
          cpu: "{{ ansible_processor_vcpus | default(ansible_processor_count | default('N/A')) }}"
          ram_total: "{{ ansible_memtotal_mb | default('N/A') }} MB"
          ram_used: >-
            {% if ansible_memavailable_mb is defined %}
              {{ ansible_memtotal_mb - ansible_memavailable_mb }} MB
            {% else %}
              N/A
            {% endif %}
          uptime_days: "{{ (ansible_uptime_seconds | default(0) // 86400) }}"
          last_patch: "{{ last_patch.stdout }}"

    ########################################################
    # DISK INFO
    ########################################################

    - name: Reset disk info per host execution
      set_fact:
        disk_info: []

    - name: Build disk info list with usage %
      set_fact:
        disk_info: >-
          {{
            disk_info + [{
              'mount': item.mount,
              'size': ((item.size_total/1024/1024/1024)|round(2)) ~ ' GB',
              'usage': (((100 * (item.size_total - item.size_available) / item.size_total) | round(1)) if item.size_total > 0 else 0) ~ '%'
            }]
          }}
      loop: "{{ ansible_mounts }}"
      when:
        - item.fstype not in ['tmpfs','devtmpfs','overlay']
        - not item.mount.startswith('/run')
        - not item.mount.startswith('/var/lib/kubelet')

    ########################################################
    # USER FILTERING
    ########################################################

    - name: Read /etc/passwd
      slurp:
        src: /etc/passwd
      register: passwd_file
      changed_when: false

    - name: Parse passwd entries
      set_fact:
        getent_passwd: "{{ getent_passwd | default({}) | combine({ item.0: {'uid': item.2, 'gid': item.3, 'home': item.5, 'shell': item.6} }) }}"
      loop: "{{ passwd_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Read /etc/group
      slurp:
        src: /etc/group
      register: group_file
      changed_when: false

    - name: Parse group entries
      set_fact:
        getent_group: "{{ getent_group | default({}) | combine({ item.0: {'gid': item.2, 'members': item.3} }) }}"
      loop: "{{ group_file.content | b64decode | split('\n') | reject('equalto','') | map('split', ':') | list }}"

    - name: Build valid local users list (UID >= 1000 OR root UID 0)
      set_fact:
        valid_users: "{{ valid_users + [ item.key ] }}"
      loop: "{{ getent_passwd | dict2items }}"
      when:
        - (item.value.uid | int >= 1000 or item.value.uid | int == 0)
        - item.key != "nobody"

    - name: Build sudo group users list
      set_fact:
        sudo_group_users: >-
          {{
            (getent_group['sudo'].members.split(',') if 'sudo' in getent_group else []) +
            (getent_group['wheel'].members.split(',') if 'wheel' in getent_group else []) +
            ['root']
          }}

    - name: Keep only sudo users
      set_fact:
        final_users: "{{ valid_users | intersect(sudo_group_users | default([])) }}"

    ########################################################
    # COLLECT USER DETAILS WITH PROTOCOL & DATE TIMESTAMPING
    ########################################################

    - name: Collect sudo user details and remote source IPs with TTY Type & Date
      shell: |
        # Get baseline last login timestamp
        LASTLOGIN=$(lastlog -u {{ item }} | tail -1 | awk '{$1=$2=$3=""; print $0}' | xargs)
        if [ -z "$LASTLOGIN" ] || echo "$LASTLOGIN" | grep -q "Never logged"; then
            LASTLOGIN="Never logged in"
        fi

        # Parse 'last' to capture unique connection types tracking their latest date stamps
        IPS_TTY_LAST=$(last -i --since "30 days ago" {{ item }} | awk '
          /^[a-zA-Z0-9]/ && !/system boot/ && !/0.0.0.0/ {
            tty=$2; ip=$3; m=$4; d=$5;
            date_str = m " " d
            
            for(i=2; i<=NF; i++) {
              if ($i ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/) {
                key_name = "SSH: " $i
                if (!latest[key_name]) latest[key_name] = date_str
              }
              if ($i ~ /^:[0-9]/ || $i ~ /xrdp/) {
                key_name = "XRDP/X11 (" $i ")"
                if (!latest[key_name]) latest[key_name] = date_str
              }
            }
          }
          END {
            out = ""
            for (conn in latest) {
              out = out (out ? "\n" : "") conn " (Latest: " latest[conn] ")"
            }
            print out
          }
        ')

        # Fallback system log verification parsing for SSH actions
        IPS_AUTH=""
        if [ -f /var/log/auth.log ]; then
            # Grabs current year month data for a standardized timestamp label
            CURR_M=$(date +%b)
            CURR_D=$(date +%e | xargs)
            IPS_AUTH=$(grep -E "Accepted password|Accepted publickey" /var/log/auth.log | grep "for {{ item }}" | awk -v m="$CURR_M" -v d="$CURR_D" '{for(i=1;i<=NF;i++) if($i=="from") print "SSH: " $(i+1) " (Latest: " m " " d ")"}' | sort -u)
        fi

        # Consolidate strings safely via printf formatting without duplication
        SRC_CONN_DATA=$(printf "%s\n%s" "${IPS_TTY_LAST}" "${IPS_AUTH}" | grep -E '[a-zA-Z0-9]' | sort -u | tr '\n' ',' | sed 's/,$//' | sed 's/^,//' | sed 's/,/, /g')

        if [ -z "$SRC_CONN_DATA" ]; then
            SRC_CONN_DATA="Local Console Access (tty1)"
        fi

        GROUPS=$(id -nG {{ item }})
        PASSLAST=$(chage -l {{ item }} | grep "Last password change" | cut -d: -f2 | xargs)
        PASSMAX=$(chage -l {{ item }} | grep "Maximum number of days between password change" | cut -d: -f2 | xargs)
        
        echo "{{ inventory_hostname }}|{{ item }}|$LASTLOGIN|$SRC_CONN_DATA|$GROUPS|Last Change: $PASSLAST, Max Age: $PASSMAX"
      loop: "{{ final_users }}"
      register: user_output
      changed_when: false
      ignore_errors: yes

    - name: Store user report data
      set_fact:
        report_data: "{{ user_output.results | map(attribute='stdout') | list }}"

    ########################################################
    # CLEAN OLD REPORTS (JENKINS WORKSPACE)
    ########################################################

    - name: Remove old report files
      run_once: true
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env','WORKSPACE') | default('.', true) }}/{{ item }}"
        state: absent
      loop:
        - system_report.txt
        - system_report.csv
        - enterprise_system_report.html

    ########################################################
    # GENERATE REPORTS
    ########################################################

    - name: Generate TXT report (Markdown Tables for Jenkins Console)
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.txt"
        content: |
          # ENTERPRISE INFRASTRUCTURE AUDIT SUMMARY REPORT

          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          ## NODE TOPOLOGY: {{ sys.host }}

          ### [1] SYSTEM METRICS TABLE
          | Operating System | Kernel Version | Machine Type | CPU Cores | RAM Total | RAM Used | Uptime | Last Patch Date |
          | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |
          | {{ sys.os }} | {{ sys.kernel }} | {{ sys.machine_type }} | {{ sys.cpu }} vCPUs | {{ sys.ram_total }} | {{ sys.ram_used }} | {{ sys.uptime_days }} Days | {{ sys.last_patch }} |

          ### [2] FILESYSTEMS TOPOLOGY TABLE
          | Mount Point | Total Capacity Size | Current Disk Utilization |
          | :--- | :--- | :--- |
          {% for disk in hostvars[host].disk_info | default([]) %}
          | {{ disk.mount }} | {{ disk.size }} | {{ disk.usage }} |
          {% endfor %}

          ### [3] PRIVILEGED ACCOUNTS & SUDO METRICS TABLE
          | User Account | Connection Protocol & Endpoint Location (With Timeline) | Last Login Timestamp | Assigned Security Groups | Password Aging Metadata |
          | :--- | :--- | :--- | :--- | :--- |
          {% if hostvars[host].final_users | length == 0 %}
          | N/A | N/A | No privileged administrative users found | N/A | N/A |
          {% else %}
          {% for line in hostvars[host].report_data | default([]) %}
          {% set cols = line.split('|') %}
          | **{{ cols[1] }}** | `{{ cols[3] }}` | {{ cols[2] }} | {{ cols[4] }} | {{ cols[5] }} |
          {% endfor %}
          {% endif %}

          ------------------------------------------------------------------------------------------------------------------------
          {% endfor %}

    - name: Generate CSV report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/system_report.csv"
        content: |
          Host,OS,Kernel,Machine,CPU,RAM_Total,RAM_Used,Uptime_days,Last_Patch
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          {{ sys.host }},{{ sys.os }},{{ sys.kernel }},{{ sys.machine_type }},{{ sys.cpu }},{{ sys.ram_total }},{{ sys.ram_used }},{{ sys.uptime_days }},{{ sys.last_patch }}
          {% endfor %}

    - name: Generate HTML report
      run_once: true
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ lookup('env','WORKSPACE') | default('.', true) }}/enterprise_system_report.html"
        content: |
          <html>
          <head>
          <title>Full System Audit Report</title>
          <style>
            body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
            table { border-collapse: collapse; width: 100%; margin-bottom: 30px; }
            th, td { border: 1px solid #dddddd; text-align: left; padding: 8px; }
            tr:nth-child(even) { background-color: #f9f9f9; }
            th { background-color: #f2f2f2; font-weight: bold; }
            .critical { background-color: #ffcccc !important; color: #cc0000; font-weight: bold; }
          </style>
          </head>
          <body>
          <h2>Full Enterprise Infrastructure Audit Report</h2>
          {% for host in ansible_play_hosts %}
          {% set sys = hostvars[host].system_info %}
          
          {# Calculate RAM math inline for color logic #}
          {% set raw_total = hostvars[host].ansible_memtotal_mb | default(0) | int %}
          {% set raw_free = hostvars[host].ansible_memfree_mb | default(0) | int %}
          {% set raw_used = raw_total - raw_free %}
          {% set ram_pct = ((raw_used / raw_total) * 100) | round(1) if raw_total > 0 else 0 %}

          <h3>Node Topology: {{ sys.host }}</h3>
          
          <h4>System Metrics Table</h4>
          <table>
            <tr>
              <th>Operating System</th><th>Kernel Version</th><th>Machine Type</th><th>CPU Cores</th><th>RAM Total</th><th>RAM Used (Usage %)</th><th>Uptime</th><th>Last Patch Date</th>
            </tr>
            <tr>
              <td>{{ sys.os }}</td>
              <td>{{ sys.kernel }}</td>
              <td>{{ sys.machine_type }}</td>
              <td>{{ sys.cpu }} vCPUs</td>
              <td>{{ sys.ram_total }}</td>
              <td class="{{ 'critical' if ram_pct >= 90.0 else '' }}">
                {{ raw_used }} MB ({{ ram_pct }}%)
              </td>
              <td>{{ sys.uptime_days }} Days</td>
              <td>{{ sys.last_patch }}</td>
            </tr>
          </table>
          
          <h4>Filesystems Topology Table</h4>
          <table>
            <tr><th>Mount Point</th><th>Total Capacity Size</th><th>Current Disk Utilization</th></tr>
            {% for disk in hostvars[host].disk_info | default([]) %}
            {% set disk_pct = disk.usage | replace('%', '') | float %}
            <tr>
              <td>{{ disk.mount }}</td>
              <td>{{ disk.size }}</td>
              <td class="{{ 'critical' if disk_pct >= 90.0 else '' }}">{{ disk.usage }}</td>
            </tr>
            {% endfor %}
          </table>
          
          <h4>Privileged Accounts & Sudo Metrics Table</h4>
          <table>
            <tr><th>User Account</th><th>Connection Protocol & Endpoint Location (With Timeline)</th><th>Last Login Timestamp</th><th>Assigned Security Groups</th><th>Password Aging Metadata</th></tr>
            {% for line in hostvars[host].report_data | default([]) %}
            {% set cols = line.split('|') %}
            <tr><td><b>{{ cols[1] }}</b></td><td><code>{{ cols[3] }}</code></td><td>{{ cols[2] }}</td><td>{{ cols[4] }}</td><td>{{ cols[5] }}</td></tr>
            {% endfor %}
          </table>
          {% endfor %}
          </body>
          </html>
