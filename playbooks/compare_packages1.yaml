---
- name: Gather installed packages from working host
  hosts: "{{ working_host }}"
  gather_facts: false

  tasks:
    - name: Get installed packages
      shell: dpkg --get-selections | grep -w install
      register: package_list
      changed_when: false

    - name: Save package list
      copy:
        content: "{{ package_list.stdout }}"
        dest: "/tmp/packages_{{ inventory_hostname }}.txt"

- name: Gather installed packages from nonworking host
  hosts: "{{ nonworking_host }}"
  gather_facts: false

  tasks:
    - name: Get installed packages
      shell: dpkg --get-selections | grep -w install
      register: package_list
      changed_when: false

    - name: Save package list
      copy:
        content: "{{ package_list.stdout }}"
        dest: "/tmp/packages_{{ inventory_hostname }}.txt"

- name: Fetch package lists
  hosts: "{{ working_host }},{{ nonworking_host }}"
  gather_facts: false

  tasks:
    - name: Fetch package list
      fetch:
        src: "/tmp/packages_{{ inventory_hostname }}.txt"
        dest: "./fetched/"
        flat: true

- name: Compare package lists
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    working_file: "./fetched/packages_{{ working_host }}.txt"
    nonworking_file: "./fetched/packages_{{ nonworking_host }}.txt"
    compare_script_url: "https://raw.githubusercontent.com/tejaspandhare/python/main/scripts/compare_packages1.py"

  tasks:

    - name: Create reports directory
      file:
        path: "./reports"
        state: directory
        mode: "0755"

    - name: Download comparison script
      get_url:
        url: "{{ compare_script_url }}"
        dest: "./compare_packages.py"
        mode: "0755"

    - name: Compare packages
      shell: |
        python3 compare_packages.py "{{ working_file }}" "{{ nonworking_file }}" --plain \
        | grep -v '^Packages' \
        | grep -v '^$'
      register: comparison_output
      changed_when: false
      failed_when: false

    - name: Print missing packages
      debug:
        var: comparison_output.stdout_lines

    - name: Generate TXT report
      copy:
        dest: "./reports/missing_packages.txt"
        content: |
          Package Comparison Report
          =========================

          Working Host    : {{ working_host }}
          Nonworking Host : {{ nonworking_host }}

          Missing Packages
          ----------------

          {% if comparison_output.stdout_lines | length == 0 %}
          No missing packages found.
          {% else %}
          {% for pkg in comparison_output.stdout_lines %}
          {{ pkg }}
          {% endfor %}
          {% endif %}

    - name: Generate HTML report
      copy:
        dest: "./reports/missing_packages.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Package Comparison Report</title>
              <style>
                  body {
                      font-family: Arial;
                      margin: 30px;
                  }
                  table {
                      border-collapse: collapse;
                      width: 60%;
                  }
                  th, td {
                      border: 1px solid #ccc;
                      padding: 8px;
                  }
                  th {
                      background: #4CAF50;
                      color: white;
                  }
              </style>
          </head>
          <body>

          <h2>Package Comparison Report</h2>

          <p><b>Working Host:</b> {{ working_host }}</p>
          <p><b>Nonworking Host:</b> {{ nonworking_host }}</p>

          <table>
              <tr>
                  <th>Missing Packages</th>
              </tr>

              {% if comparison_output.stdout_lines | length == 0 %}
              <tr>
                  <td>No missing packages found.</td>
              </tr>
              {% else %}
              {% for pkg in comparison_output.stdout_lines %}
              <tr>
                  <td>{{ pkg }}</td>
              </tr>
              {% endfor %}
              {% endif %}
          </table>

          </body>
          </html>

    - name: Verify reports
      shell: |
        pwd
        ls -l ./reports
      register: report_check
      changed_when: false

    - debug:
        var: report_check.stdout_lines
