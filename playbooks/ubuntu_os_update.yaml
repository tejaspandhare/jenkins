---
- name: Ubuntu OS Patching & Kernel Management
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required_file: "/var/run/reboot-required"

  tasks:

    ############################################################
    # START MESSAGE
    ############################################################
    - name: Show patch start
      ansible.builtin.debug:
        msg: "\033[0;34m============================================\033[0m\n\033[0;32mStarting patching on {{ inventory_hostname }} ({{ ansible_distribution }})\033[0m\n\033[0;34m============================================\033[0m"
      changed_when: false

    ############################################################
    # CAPTURE CURRENT KERNEL
    ############################################################
    - name: Get running kernel version
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    ############################################################
    # UPDATE & UPGRADE
    ############################################################
    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        install_recommends: yes
      register: upgrade_result
      ignore_errors: yes

    ############################################################
    # CHECK LATEST INSTALLED KERNEL
    ############################################################
    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-[0-9]*' \
        | awk '/^ii/{print $2}' \
        | sed 's/linux-image-//' \
        | sort -V \
        | tail -n1
      register: latest_kernel
      changed_when: false

    ############################################################
    # REBOOT CHECK
    ############################################################
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    ############################################################
    # PATCH SUMMARY (Colored, Jenkins-friendly)
    ############################################################
    - name: Display patch summary
      ansible.builtin.debug:
        msg: |
          \033[0;34m============================================\033[0m
          \033[0;32mHost                :\033[0m {{ inventory_hostname }}
          \033[0;32mPackages Updated    :\033[0m {{ upgrade_result.changed | default(false) }}
          \033[0;32mRunning Kernel      :\033[0m {{ running_kernel.stdout }}
          \033[0;32mLatest Kernel       :\033[0m {{ latest_kernel.stdout }}
          \033[0;33mReboot Required     :\033[0m {{ reboot_required }}
          \033[0;34m============================================\033[0m
      changed_when: false

    ############################################################
    # REBOOT IF REQUIRED
    ############################################################
    - name: Reboot host if required
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required

    - name: Capture kernel after reboot
      ansible.builtin.command: uname -r
      register: post_reboot_kernel
      changed_when: false
      when: reboot_required

    - name: Display kernel after reboot
      ansible.builtin.debug:
        msg: "\033[0;32mKernel after reboot:\033[0m {{ post_reboot_kernel.stdout }}"
      when: reboot_required

    ############################################################
    # FINAL CHECK: Ensure kernel was updated
    ############################################################
    - name: Fail if kernel rollback detected
      ansible.builtin.fail:
        msg: "\033[0;31mKernel rollback detected! Patch might have failed.\033[0m"
      when: post_reboot_kernel is defined and (post_reboot_kernel.stdout < running_kernel.stdout)
