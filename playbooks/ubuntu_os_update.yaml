---
- name: Ubuntu OS Patching & Kernel Management
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required_file: "/var/run/reboot-required"

    # ANSI colors
    GREEN: "\033[0;32m"
    RED: "\033[0;31m"
    YELLOW: "\033[0;33m"
    BLUE: "\033[0;34m"
    RESET: "\033[0m"

  tasks:

  #####################################################################
  # UPDATE & UPGRADE
  #####################################################################

  - name: Update APT cache
    apt:
      update_cache: yes
      cache_valid_time: 3600

  - name: Upgrade all packages
    apt:
      upgrade: dist
      autoremove: yes
      install_recommends: yes
    register: upgrade_result

  #####################################################################
  # KERNEL INFORMATION
  #####################################################################

  - name: Get running kernel
    command: uname -r
    register: running_kernel
    changed_when: false

  - name: Get latest installed kernel
    shell: |
      dpkg -l 'linux-image-[0-9]*' \
      | awk '/^ii/{print $2}' \
      | sed 's/linux-image-//' \
      | sort -V \
      | tail -n1
    register: latest_kernel
    changed_when: false

  #####################################################################
  # REBOOT CHECK
  #####################################################################

  - name: Check if reboot required
    stat:
      path: "{{ reboot_required_file }}"
    register: reboot_file

  - name: Set reboot flag
    set_fact:
      reboot_required: "{{ reboot_file.stat.exists }}"

  #####################################################################
  # CLEAN SUMMARY OUTPUT
  #####################################################################

  - name: Patching Summary
    debug:
      msg: |
        {{ BLUE }}============================================{{ RESET }}
        {{ GREEN }}Host                :{{ RESET }} {{ inventory_hostname }}
        {{ GREEN }}Packages Updated    :{{ RESET }} {{ upgrade_result.changed }}
        {{ GREEN }}Running Kernel      :{{ RESET }} {{ running_kernel.stdout }}
        {{ GREEN }}Latest Kernel       :{{ RESET }} {{ latest_kernel.stdout }}
        {{ YELLOW }}Reboot Required     :{{ RESET }} {{ reboot_required }}
        {{ BLUE }}============================================{{ RESET }}

  #####################################################################
  # REBOOT IF REQUIRED
  #####################################################################

  - name: Reboot system if needed
    reboot:
      reboot_timeout: 600
    when: reboot_required

  - name: Verify kernel after reboot
    command: uname -r
    register: post_kernel
    changed_when: false
    when: reboot_required

  - name: Post reboot kernel info
    debug:
      msg: "{{ GREEN }}Kernel after reboot:{{ RESET }} {{ post_kernel.stdout }}"
    when: reboot_required
