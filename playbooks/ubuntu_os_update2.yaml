---
############################################################
# ENTERPRISE LINUX PATCHING PLAYBOOK
############################################################

- name: Enterprise Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  serial: 1
  gather_facts: yes

  vars:
    reboot_required: false
    reboot_timeout: 600

  tasks:

############################################################
# START MESSAGE
############################################################

  - name: Show patch start
    debug:
      msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

############################################################
# CAPTURE OLD KERNEL
############################################################

  - name: Capture current kernel
    command: uname -r
    register: old_kernel
    changed_when: false

############################################################
# UBUNTU / DEBIAN
############################################################

  - name: Update apt cache
    apt:
      update_cache: yes
    when: ansible_os_family == "Debian"
    changed_when: false
    no_log: true

  - name: Upgrade Debian packages
    apt:
      upgrade: dist
      autoremove: yes
    when: ansible_os_family == "Debian"
    register: upgrade_result
    ignore_errors: yes
    no_log: true

############################################################
# RHEL FAMILY
############################################################

  - name: Upgrade RHEL packages
    dnf:
      name: "*"
      state: latest
    when: ansible_os_family == "RedHat"
    register: upgrade_result
    ignore_errors: yes
    no_log: true

############################################################
# SUSE
############################################################

  - name: Refresh SUSE repos
    command: zypper refresh
    when: ansible_os_family == "Suse"
    changed_when: false
    no_log: true

  - name: Upgrade SUSE packages
    zypper:
      name: "*"
      state: latest
    when: ansible_os_family == "Suse"
    register: upgrade_result
    ignore_errors: yes
    no_log: true

############################################################
# CAPTURE NEW KERNEL
############################################################

  - name: Capture new kernel
    command: uname -r
    register: new_kernel
    changed_when: false

############################################################
# DETECT KERNEL CHANGE
############################################################

  - name: Determine if reboot required
    set_fact:
      reboot_required: "{{ old_kernel.stdout != new_kernel.stdout }}"

############################################################
# AUTO REBOOT IF REQUIRED
############################################################

  - name: Reboot server if kernel updated
    reboot:
      msg: "Reboot triggered by Ansible patching"
      reboot_timeout: "{{ reboot_timeout }}"
    when: reboot_required

############################################################
# WAIT FOR SERVER
############################################################

  - name: Wait for server to come back
    wait_for_connection:
      delay: 10
      timeout: 300
    when: reboot_required

############################################################
# CLEAN SERVER OUTPUT
############################################################

  - name: Print patch result
    debug:
      msg: |
        ======================================
        Host : {{ inventory_hostname }}
        OS   : {{ ansible_distribution }}

        Old Kernel : {{ old_kernel.stdout }}
        New Kernel : {{ new_kernel.stdout }}

        Patch Status    : {{ 'Patched' if upgrade_result.changed else 'No Updates Available' }}
        Reboot Required : {{ reboot_required }}
        ======================================

############################################################
# SAVE RESULT
############################################################

  - name: Save patch result
    set_fact:
      patch_result:
        host: "{{ inventory_hostname }}"
        os: "{{ ansible_distribution }}"
        updated: "{{ upgrade_result.changed | default(false) }}"
        failed: "{{ upgrade_result.failed | default(false) }}"
        reboot_required: "{{ reboot_required }}"
      no_log: true


############################################################
# FINAL PATCH REPORT
############################################################

- name: Patch Summary
  hosts: localhost
  gather_facts: no

  tasks:

  - name: Collect results
    set_fact:
      results: >-
        {{
          groups['all']
          | map('extract', hostvars)
          | selectattr('patch_result','defined')
          | map(attribute='patch_result')
          | list
        }}

  - name: Count patched servers
    set_fact:
      patched: "{{ results | selectattr('updated','equalto',true) | list | length }}"

  - name: Count failed servers
    set_fact:
      failed: "{{ results | selectattr('failed','equalto',true) | list | length }}"

  - name: Count reboot servers
    set_fact:
      reboot: "{{ results | selectattr('reboot_required','equalto',true) | list | length }}"

  - name: Print final report
    debug:
      msg: |
        ======================================
        ENTERPRISE LINUX PATCH SUMMARY
        ======================================
        Total Servers   : {{ results | length }}
        Patched Servers : {{ patched }}
        Failed Servers  : {{ failed }}
        Rebooted        : {{ reboot }}
        ======================================
