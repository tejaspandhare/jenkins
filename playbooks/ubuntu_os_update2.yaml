---
- name: Ubuntu OS Patch & Kernel Update
  hosts: "{{ hosts }}"
  gather_facts: yes
  become: true

  vars:
    # Safe defaults
    reboot_required: false
    running_kernel_version: "{{ ansible_kernel }}"
    latest_kernel_version: ""

  tasks:

    #####################################################################
    # UPDATE APT CACHE AND FIX BROKEN PACKAGES
    #####################################################################
    - name: Fix broken packages
      apt:
        fix_broken: yes
      register: fix_result
      changed_when: fix_result.changed

    - name: Update APT cache
      apt:
        update_cache: yes
      register: apt_update
      changed_when: apt_update.changed

    #####################################################################
    # FULL UPGRADE (install all pending updates, including kernel)
    #####################################################################
    - name: Perform full upgrade
      apt:
        upgrade: dist
      register: upgrade_result
      changed_when: upgrade_result.changed

    #####################################################################
    # DETERMINE LATEST INSTALLED KERNEL
    #####################################################################
    - name: Get latest installed kernel
      shell: |
        dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | sort -V | tail -n1 | sed 's/linux-image-//'
      register: latest_kernel
      changed_when: false

    - name: Set latest kernel fact
      set_fact:
        latest_kernel_version: "{{ latest_kernel.stdout }}"

    #####################################################################
    # CHECK IF REBOOT IS REQUIRED
    #####################################################################
    - name: Check if reboot required
      stat:
        path: /var/run/reboot-required
      register: reboot_file
      changed_when: false

    - name: Set reboot fact
      set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # DISPLAY KERNEL STATUS WITH COLORS (Jenkins Console Friendly)
    #####################################################################
    - name: Display kernel comparison in colors
      shell: |
        echo -e "\033[1;34m==============================\033[0m"
        echo -e "\033[1;36mRunning Kernel: \033[0m {{ running_kernel_version }}"
        echo -e "\033[1;32mLatest Installed Kernel: \033[0m {{ latest_kernel_version }}"
        {% if reboot_required %}
        echo -e "\033[1;31mReboot Required: YES\033[0m"
        echo -e "\033[1;33mKernel after reboot: \033[0m {{ latest_kernel_version }}"
        {% else %}
        echo -e "\033[1;32mReboot Required: NO\033[0m"
        echo -e "\033[1;33mKernel after reboot: \033[0m {{ running_kernel_version }}"
        {% endif %}
        echo -e "\033[1;34m==============================\033[0m"
      changed_when: false

    #####################################################################
    # SAFE REBOOT IF NEEDED
    #####################################################################
    - name: Reboot the server if required
      reboot:
        reboot_timeout: 600
        pre_reboot_delay: 5
        post_reboot_delay: 10
      when: reboot_required
