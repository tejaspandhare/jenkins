---
- name: Cross Platform OS Maintenance
  hosts: "{{ hosts.split(';') }}"
  gather_facts: true
  become: true

  vars:
    EXCLUDE_PKGS: "{{ lookup('env', 'EXCLUDE_PKGS') | default('') }}"
    exclude_packages_list: "{{ EXCLUDE_PKGS.split(';') | map('trim') | reject('equalto','') | list }}"

  tasks:

  #####################################################################
  # PACKAGE UPDATES
  #####################################################################

  - name: Update packages (Debian)
    apt:
      update_cache: yes
      upgrade: dist
    when: ansible_facts['os_family'] == "Debian"

  - name: Update packages (RHEL7 and below)
    yum:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int < 8

  - name: Update packages (RHEL8+)
    dnf:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: Update packages (SUSE)
    zypper:
      name: "*"
      state: latest
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # HOLD PACKAGES (Debian Only)
  #####################################################################

  - name: Hold excluded packages (Debian)
    command: apt-mark hold {{ item }}
    loop: "{{ exclude_packages_list }}"
    when:
      - ansible_facts['os_family'] == "Debian"
      - exclude_packages_list | length > 0
    ignore_errors: true

  #####################################################################
  # KERNEL CHECK
  #####################################################################

  - name: Get running kernel version
    command: uname -r
    register: running_kernel
    changed_when: false

  #####################################################################
  # Get latest installed kernel safely (literal block avoids YAML errors)
  #####################################################################

  - name: Get latest installed kernel (Debian)
    shell: |
      dpkg -l "linux-image-*" | awk '/^ii/{print $2}' | sort -V | tail -n1 | sed 's/linux-image-//'
    register: latest_kernel_debian
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "Debian"

  - name: Get latest installed kernel (RedHat)
    shell: |
      rpm -q kernel | sort -V | tail -n1 | sed 's/kernel-//'
    register: latest_kernel_redhat
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "RedHat"

  - name: Get latest installed kernel (SUSE)
    shell: |
      rpm -q kernel-default | sort -V | tail -n1 | sed 's/kernel-default-//'
    register: latest_kernel_suse
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # Normalize kernel variables
  #####################################################################

  - name: Set normalized kernel variables
    set_fact:
      running_kernel_version: "{{ running_kernel.stdout | default('UNKNOWN') | trim }}"
      latest_kernel_version: >-
        {{ (latest_kernel_debian.stdout if latest_kernel_debian is defined else
           (latest_kernel_redhat.stdout if latest_kernel_redhat is defined else
           (latest_kernel_suse.stdout if latest_kernel_suse is defined else 'UNKNOWN'))) | trim }}

  - name: Determine if reboot is required
    set_fact:
      reboot_required: "{{ running_kernel_version != latest_kernel_version }}"

  #####################################################################
  # Print kernel versions (safe)
  #####################################################################

  - name: Display kernel comparison
    debug:
      msg: |
        Old kernel: {{ running_kernel_version }}
        New kernel: {{ latest_kernel_version }}
        {% if reboot_required %}
        Reboot Required: YES
        {% else %}
        Reboot Required: NO
        {% endif %}

  #####################################################################
  # Reboot if new kernel installed
  #####################################################################

  - name: Reboot system if new kernel detected
    reboot:
      msg: "Reboot triggered by Ansible (new kernel installed)"
      reboot_timeout: 900
    when: reboot_required
