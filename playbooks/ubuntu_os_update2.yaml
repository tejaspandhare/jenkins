---
- name: Ubuntu OS Patching & Kernel Management
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    apt_upgrade_options: "dist"
    reboot_required_file: "/var/run/reboot-required"

  tasks:

    #####################################################################
    # UPDATE APT CACHE
    #####################################################################
    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update_result

    #####################################################################
    # UPGRADE PACKAGES
    #####################################################################
    - name: Upgrade all packages including dependencies
      ansible.builtin.apt:
        upgrade: "{{ apt_upgrade_options }}"
        autoremove: yes
        install_recommends: yes
      register: upgrade_result
      no_log: true
      ignore_errors: yes

    #####################################################################
    # DETERMINE KERNEL VERSIONS
    #####################################################################
    - name: Get running kernel version
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | sort -V | tail -n1 | sed 's/linux-image-//'
      register: latest_kernel
      changed_when: false

    - name: Set kernel facts
      ansible.builtin.set_fact:
        running_kernel_version: "{{ running_kernel.stdout }}"
        latest_kernel_version: "{{ latest_kernel.stdout }}"

    #####################################################################
    # CHECK IF REBOOT IS REQUIRED
    #####################################################################
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set reboot fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # PRINT HOST PATCH STATUS (Jenkins friendly)
    #####################################################################
    - name: Print host patch summary
      ansible.builtin.shell: |
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[1;33m'
        NC='\033[0m'

        UPDATED="{{ 'True' if upgrade_result.changed else 'False' }}"
        REBOOT="{{ 'True' if reboot_required else 'False' }}"
        FAILED="{{ 'True' if upgrade_result is failed else 'False' }}"

        echo -e "Host: {{ inventory_hostname }} | Updated: ${GREEN}${UPDATED}${NC} | Reboot: ${YELLOW}${REBOOT}${NC} | Failed: ${RED}${FAILED}${NC} | Running Kernel: {{ running_kernel_version }} | Latest Kernel: {{ latest_kernel_version }}"
      changed_when: false

    #####################################################################
    # REBOOT HOST IF NEEDED
    #####################################################################
    - name: Reboot host if required
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required

    #####################################################################
    # COLLECT HOST PATCH RESULTS FOR BATCH SUMMARY
    #####################################################################
    - name: Set host patch result fact
      ansible.builtin.set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          changed: "{{ upgrade_result.changed | default(false) }}"
          reboot_required: "{{ reboot_required }}"
          running_kernel: "{{ running_kernel_version }}"
          latest_kernel: "{{ latest_kernel_version }}"
          failed: "{{ upgrade_result is failed }}"
          
    - name: Add host patch result to results list
      ansible.builtin.set_fact:
        results: "{{ results | default([]) + [ patch_result ] }}"
      run_once: false

    #####################################################################
    # PRINT BATCH SUMMARY ON CONTROLLER
    #####################################################################
    - name: Print batch summary
      ansible.builtin.shell: |
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[1;33m'
        NC='\033[0m'

        TOTAL={{ results | length }}
        UPDATED={{ results | selectattr('changed','equalto',true) | list | length }}
        REBOOT={{ results | selectattr('reboot_required','equalto',true) | list | length }}
        FAILED={{ results | selectattr('failed','equalto',true) | list | length }}

        echo -e "==================================="
        echo -e "TOTAL HOSTS: ${TOTAL}"
        echo -e "UPDATED: ${GREEN}${UPDATED}${NC}"
        echo -e "REBOOT REQUIRED: ${YELLOW}${REBOOT}${NC}"
        echo -e "FAILED: ${RED}${FAILED}${NC}"
        echo -e "==================================="
      run_once: true
      changed_when: false
