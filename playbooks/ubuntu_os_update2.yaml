---
############################################################
# UNIVERSAL LINUX PATCHING
############################################################

- name: Universal Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required: false

  tasks:

  ############################################################
  # SHOW HOST INFO
  ############################################################

    - name: Show host and OS
      debug:
        msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

  ############################################################
  # CAPTURE OLD KERNEL
  ############################################################

    - name: Capture current kernel before patch
      command: uname -r
      register: old_kernel
      changed_when: false

  ############################################################
  # UBUNTU / DEBIAN PATCHING
  ############################################################

    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"
      changed_when: false
      no_log: true

    - name: Upgrade Ubuntu/Debian packages
      apt:
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

  ############################################################
  # RHEL / CENTOS / ROCKY / ALMALINUX PATCHING
  ############################################################

    - name: Upgrade RHEL family packages
      dnf:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

  ############################################################
  # SLES / SUSE PATCHING
  ############################################################

    - name: Refresh zypper repositories
      command: zypper refresh
      when: ansible_os_family == "Suse"
      changed_when: false
      no_log: true

    - name: Upgrade SLES packages
      zypper:
        name: '*'
        state: latest
      when: ansible_os_family == "Suse"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

  ############################################################
  # CAPTURE NEW KERNEL
  ############################################################

    - name: Capture kernel after patch
      command: uname -r
      register: new_kernel
      changed_when: false

  ############################################################
  # DETERMINE REBOOT REQUIRED
  ############################################################

    - name: Check if reboot required by kernel change
      set_fact:
        reboot_required: "{{ old_kernel.stdout != new_kernel.stdout }}"

  ############################################################
  # CLEAN OUTPUT PER SERVER
  ############################################################

    - name: Print patch result
      debug:
        msg: |
          ======================================
          Host : {{ inventory_hostname }}
          OS   : {{ ansible_distribution }}

          Old Kernel : {{ old_kernel.stdout }}
          New Kernel : {{ new_kernel.stdout }}

          Reboot Required : {{ reboot_required }}
          Updated         : {{ upgrade_result.changed | default(false) }}
          Failed          : {{ upgrade_result.failed | default(false) }}
          ======================================

  ############################################################
  # SAVE PATCH RESULT
  ############################################################

    - name: Save patch result
      set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }}"
          old_kernel: "{{ old_kernel.stdout }}"
          new_kernel: "{{ new_kernel.stdout }}"
          updated: "{{ upgrade_result.changed | default(false) }}"
          failed: "{{ upgrade_result.failed | default(false) }}"
          reboot_required: "{{ reboot_required }}"
      no_log: true


############################################################
# PATCH SUMMARY (RUNS ON JENKINS / LOCALHOST)
############################################################

- name: Patch Summary
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Collect patch results
      set_fact:
        results: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('patch_result', 'defined')
            | map(attribute='patch_result')
            | list
          }}

    - name: Count patched servers
      set_fact:
        updated_servers: "{{ results | selectattr('updated','equalto',true) | list | length }}"

    - name: Count failed servers
      set_fact:
        failed_servers: "{{ results | selectattr('failed','equalto',true) | list | length }}"

    - name: Count reboot required
      set_fact:
        reboot_servers: "{{ results | selectattr('reboot_required','equalto',true) | list | length }}"

    - name: Print final patch summary
      debug:
        msg: |
          ======================================
          UNIVERSAL LINUX PATCH SUMMARY
          ======================================
          Total Servers     : {{ results | length }}
          Patched Servers   : {{ updated_servers }}
          Failed Servers    : {{ failed_servers }}
          Reboot Required   : {{ reboot_servers }}
          ======================================
