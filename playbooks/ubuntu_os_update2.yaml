---
- name: Ubuntu OS Full Patching & Kernel Check
  hosts: "{{ hosts | default('all') }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required: false

  tasks:

    #####################################################################
    # UPDATE APT CACHE AND FIX BROKEN PACKAGES
    #####################################################################
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages including kernel
      ansible.builtin.apt:
        upgrade: dist
        install_recommends: yes

    #####################################################################
    # GET KERNEL INFORMATION
    #####################################################################
    - name: Get running kernel version
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | sort -V | tail -n1
      register: latest_kernel
      changed_when: false

    #####################################################################
    # DETERMINE IF REBOOT IS REQUIRED
    #####################################################################
    - name: Check if reboot required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_file

    - name: Set reboot fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # PRINT KERNEL STATUS
    #####################################################################
    - name: Show kernel and reboot status
      ansible.builtin.debug:
        msg: |
          \033[1;34m==============================\033[0m
          \033[1;36mRunning Kernel: \033[0m {{ running_kernel.stdout }}
          \033[1;32mLatest Installed Kernel: \033[0m {{ latest_kernel.stdout }}
          \033[1;32mReboot Required: \033[0m {{ 'YES' if reboot_required else 'NO' }}
          \033[1;33mKernel after reboot: \033[0m {{ latest_kernel.stdout }}
          \033[1;34m==============================\033[0m
