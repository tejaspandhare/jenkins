---
- name: Enterprise Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_timeout: 600
    patch_results: []

  tasks:

    #####################################################################
    # PRE PATCH HEALTH CHECK
    #####################################################################
    - name: Show patch start
      ansible.builtin.shell: |
        echo -e "\033[0;34m============================================\033[0m"
        echo -e "\033[0;32mStarting patching on: \033[0m {{ inventory_hostname }} ({{ ansible_distribution }})"
        echo -e "\033[0;34m============================================\033[0m"
      changed_when: false

    - name: Check disk space
      ansible.builtin.command: df -h /
      register: disk_check
      changed_when: false

    - name: Check load average
      ansible.builtin.command: uptime
      register: load_check
      changed_when: false

    #####################################################################
    # CAPTURE CURRENT KERNEL
    #####################################################################
    - name: Capture current kernel
      ansible.builtin.command: uname -r
      register: old_kernel
      changed_when: false

    #####################################################################
    # PATCHING
    #####################################################################
    - name: Update Debian/Ubuntu
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: patch_result
      ignore_errors: yes

    - name: Update RHEL/CentOS/Rocky/Alma
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"
      register: patch_result
      ignore_errors: yes

    - name: Update SUSE/SLES
      ansible.builtin.zypper:
        name: "*"
        state: latest
      when: ansible_os_family == "Suse"
      register: patch_result
      ignore_errors: yes

    #####################################################################
    # CHECK IF REBOOT REQUIRED
    #####################################################################
    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: >-
          {{
            (ansible_os_family == "Debian" and (ansible_facts['ansible_local'].reboot_required | default(false))) 
            or (ansible_os_family in ["RedHat", "Suse"] and (ansible_facts['ansible_kernel'] != ansible_facts['ansible_kernel_release']))
          }}

    #####################################################################
    # REBOOT IF REQUIRED
    #####################################################################
    - name: Reboot system if required
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
      when: reboot_required

    - name: Wait for server after reboot
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      when: reboot_required

    #####################################################################
    # POST PATCH VALIDATION
    #####################################################################
    - name: Capture new kernel
      ansible.builtin.command: uname -r
      register: new_kernel
      changed_when: false

    - name: Check system running status
      ansible.builtin.command: systemctl is-system-running
      register: system_status
      changed_when: false
      failed_when: system_status.stdout not in ["running","degraded"]

    #####################################################################
    # CLEAN SUMMARY OUTPUT
    #####################################################################
    - name: Display patch summary per host
      ansible.builtin.shell: |
        echo -e "\033[0;34m============================================\033[0m"
        echo -e "\033[0;32mHost                :\033[0m {{ inventory_hostname }}"
        echo -e "\033[0;32mPackages Updated    :\033[0m {{ patch_result.changed | default(false) }}"
        echo -e "\033[0;32mRunning Kernel      :\033[0m {{ old_kernel.stdout }}"
        echo -e "\033[0;32mLatest Kernel       :\033[0m {{ new_kernel.stdout }}"
        echo -e "\033[0;33mReboot Performed    :\033[0m {{ reboot_required }}"
        echo -e "\033[0;32mSystem Status       :\033[0m {{ system_status.stdout }}"
        echo -e "\033[0;34m============================================\033[0m"
      changed_when: false

    #####################################################################
    # COLLECT RESULTS FOR PLAY RECAP
    #####################################################################
    - name: Append host patch result
      ansible.builtin.set_fact:
        patch_results: "{{ patch_results + [ {'host': inventory_hostname, 'updated': patch_result.changed | default(false), 'rebooted': reboot_required, 'failed': patch_result.failed | default(false) } ] }}"

- name: Display play recap
  hosts: localhost
  gather_facts: no
  vars:
    patch_results: "{{ hostvars | map(attribute='patch_results') | sum(start=[]) }}"
  tasks:
    - name: Play recap
      ansible.builtin.shell: |
        TOTAL_HOSTS={{ patch_results | length }}
        HOSTS_UPDATED={{ patch_results | selectattr('updated','equalto',true) | list | length }}
        HOSTS_FAILED={{ patch_results | selectattr('failed','equalto',true) | list | length }}
        HOSTS_REBOOTED={{ patch_results | selectattr('rebooted','equalto',true) | list | length }}

        echo -e "\033[0;34m============================================\033[0m"
        echo -e "\033[0;32mTOTAL HOSTS       :\033[0m $TOTAL_HOSTS"
        echo -e "\033[0;32mHOSTS UPDATED     :\033[0m $HOSTS_UPDATED"
        echo -e "\033[0;31mHOSTS FAILED      :\033[0m $HOSTS_FAILED"
        echo -e "\033[0;33mHOSTS REBOOTED    :\033[0m $HOSTS_REBOOTED"
        echo -e "\033[0;34m============================================\033[0m"
      changed_when: false
