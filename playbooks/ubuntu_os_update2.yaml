---
- name: Enterprise Ubuntu Patching (Batch Mode)
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: false
  serial: 50
  strategy: linear

  vars:
    reboot_required_file: "/var/run/reboot-required"

  tasks:

    #####################################################################
    # UPDATE + UPGRADE (Silent)
    #####################################################################

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      changed_when: false

    - name: Upgrade packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        install_recommends: yes
        dpkg_options:
          - "--force-confdef"
          - "--force-confold"
      register: upgrade_result
      no_log: true

    #####################################################################
    # KERNEL CHECK
    #####################################################################

    - name: Get running kernel
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel
      ansible.builtin.shell: |
        dpkg -l 'linux-image-[0-9]*' \
        | awk '/^ii/{print $2}' \
        | sed 's/linux-image-//' \
        | sort -V \
        | tail -n1
      register: latest_kernel
      changed_when: false

    - name: Check reboot requirement
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set per-host result facts
      ansible.builtin.set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          changed: "{{ upgrade_result.changed }}"
          running_kernel: "{{ running_kernel.stdout }}"
          latest_kernel: "{{ latest_kernel.stdout }}"
          reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # REBOOT IF REQUIRED
    #####################################################################

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 900
      when: reboot_file.stat.exists

    #####################################################################
    # CLEAN PER-HOST SUMMARY
    #####################################################################

    - name: Print per-host summary
      ansible.builtin.debug:
        msg: |
          {{ inventory_hostname }} |
          Updated: {{ upgrade_result.changed }} |
          Reboot: {{ reboot_file.stat.exists }}
