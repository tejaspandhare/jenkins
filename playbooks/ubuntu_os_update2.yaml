---
- name: Universal Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required: false

  tasks:

    - name: Show host and OS
      debug:
        msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

    ############################################################
    # UBUNTU / DEBIAN
    ############################################################

    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"
      changed_when: false
      no_log: true

    - name: Upgrade Ubuntu/Debian packages
      apt:
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

    - name: Check reboot required (Ubuntu)
      stat:
        path: /var/run/reboot-required
      when: ansible_os_family == "Debian"
      register: reboot_file
      no_log: true

    - name: Set reboot fact Ubuntu
      set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"
      when: ansible_os_family == "Debian"
      no_log: true

    ############################################################
    # RHEL / CENTOS / ROCKY / ALMALINUX
    ############################################################

    - name: Upgrade RHEL family packages
      dnf:
        name: '*'
        state: latest
      when: ansible_os_family == "RedHat"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

    - name: Check reboot requirement (RHEL)
      command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false
      when: ansible_os_family == "RedHat"
      no_log: true

    - name: Set reboot fact RHEL
      set_fact:
        reboot_required: "{{ reboot_check.rc == 1 }}"
      when: ansible_os_family == "RedHat"
      no_log: true

    ############################################################
    # SLES / SUSE
    ############################################################

    - name: Refresh zypper repositories
      command: zypper refresh
      when: ansible_os_family == "Suse"
      changed_when: false
      no_log: true

    - name: Upgrade SLES packages
      zypper:
        name: '*'
        state: latest
      when: ansible_os_family == "Suse"
      register: upgrade_result
      ignore_errors: yes
      no_log: true

    - name: Check reboot required (SLES)
      command: zypper ps -s
      register: reboot_check_suse
      failed_when: false
      changed_when: false
      when: ansible_os_family == "Suse"
      no_log: true

    - name: Set reboot fact SUSE
      set_fact:
        reboot_required: "{{ reboot_check_suse.stdout != '' }}"
      when: ansible_os_family == "Suse"
      no_log: true

    ############################################################
    # RESULT OUTPUT (CLEAN FOR JENKINS)
    ############################################################

    - name: Print patch result
      debug:
        msg: >
          Host={{ inventory_hostname }}
          OS={{ ansible_distribution }}
          Updated={{ upgrade_result.changed | default(false) }}
          RebootRequired={{ reboot_required }}
          Failed={{ upgrade_result.failed | default(false) }}

    - name: Save patch result
      set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }}"
          updated: "{{ upgrade_result.changed | default(false) }}"
          failed: "{{ upgrade_result.failed | default(false) }}"
          reboot_required: "{{ reboot_required }}"
      no_log: true


############################################################
# PATCH SUMMARY
############################################################

- name: Patch Summary
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Collect patch results safely
      set_fact:
        results: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('patch_result', 'defined')
            | map(attribute='patch_result')
            | list
          }}

    - name: Count updated servers
      set_fact:
        updated_servers: "{{ results | selectattr('updated','equalto',true) | list | length }}"

    - name: Count failed servers
      set_fact:
        failed_servers: "{{ results | selectattr('failed','equalto',true) | list | length }}"

    - name: Count reboot required
      set_fact:
        reboot_servers: "{{ results | selectattr('reboot_required','equalto',true) | list | length }}"

    - name: Print summary
      debug:
        msg: |
          ======================================
          UNIVERSAL LINUX PATCH SUMMARY
          ======================================
          Total Servers   : {{ results | length }}
          Updated Servers : {{ updated_servers }}
          Failed Servers  : {{ failed_servers }}
          Reboot Required : {{ reboot_servers }}
          ======================================
