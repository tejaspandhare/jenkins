---
- name: Ubuntu OS Patching & Kernel Management (Enterprise Clean)
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: false

  vars:
    reboot_required_file: "/var/run/reboot-required"

  tasks:

    #####################################################################
    # MINIMAL FACTS (avoid 300+ lines of ansible_facts output)
    #####################################################################

    - name: Gather minimal system facts
      ansible.builtin.setup:
        gather_subset:
          - min
      changed_when: false

    #####################################################################
    # UPDATE CACHE (silent)
    #####################################################################

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      changed_when: false

    #####################################################################
    # DIST-UPGRADE (no dpkg scroll in logs)
    #####################################################################

    - name: Upgrade all packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        install_recommends: yes
        dpkg_options:
          - "--force-confdef"
          - "--force-confold"
      register: upgrade_result
      no_log: true

    #####################################################################
    # KERNEL INFORMATION
    #####################################################################

    - name: Get running kernel version
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-[0-9]*' \
        | awk '/^ii/{print $2}' \
        | sed 's/linux-image-//' \
        | sort -V \
        | tail -n1
      register: latest_kernel
      changed_when: false

    - name: Set kernel facts
      ansible.builtin.set_fact:
        running_kernel_version: "{{ running_kernel.stdout }}"
        latest_kernel_version: "{{ latest_kernel.stdout }}"

    #####################################################################
    # REBOOT CHECK
    #####################################################################

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # CLEAN SUMMARY (ONLY VISIBLE OUTPUT)
    #####################################################################

    - name: Display patch summary
      ansible.builtin.debug:
        msg: |
          =================================
          Host: {{ inventory_hostname }}
          Packages Updated: {{ upgrade_result.changed }}
          Running Kernel: {{ running_kernel_version }}
          Latest Installed Kernel: {{ latest_kernel_version }}
          Reboot Required: {{ reboot_required }}
          =================================

    #####################################################################
    # REBOOT IF REQUIRED
    #####################################################################

    - name: Reboot host if required
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: reboot_required

    - name: Verify kernel after reboot
      ansible.builtin.command: uname -r
      register: post_reboot_kernel
      changed_when: false
      when: reboot_required

    - name: Display post-reboot kernel
      ansible.builtin.debug:
        msg: "Kernel after reboot: {{ post_reboot_kernel.stdout }}"
      when: reboot_required
