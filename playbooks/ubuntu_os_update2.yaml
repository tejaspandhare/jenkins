---
- name: Cross Platform OS Maintenance
  hosts: "{{ hosts.split(';') }}"
  gather_facts: true
  become: true

  vars:
    EXCLUDE_PKGS: "{{ lookup('env', 'EXCLUDE_PKGS') | default('') }}"
    exclude_packages_list: "{{ EXCLUDE_PKGS.split(';') | map('trim') | reject('equalto','') | list }}"

  tasks:

  #####################################################################
  # PACKAGE UPDATES
  #####################################################################

  # Debian / Ubuntu
  - name: Update and upgrade (Debian-based)
    apt:
      update_cache: yes
      upgrade: dist
    when: ansible_facts['os_family'] == "Debian"

  # RHEL 7 and below
  - name: Update packages using yum (RHEL 7 and below)
    yum:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int < 8

  # RHEL 8+
  - name: Update packages using dnf (RHEL 8+)
    dnf:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int >= 8

  # SUSE
  - name: Update packages using zypper (SUSE-based)
    zypper:
      name: "*"
      state: latest
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # HOLD PACKAGES (Debian Only)
  #####################################################################

  - name: Hold excluded packages (Debian-based)
    command: apt-mark hold {{ item }}
    loop: "{{ exclude_packages_list }}"
    when:
      - ansible_facts['os_family'] == "Debian"
      - exclude_packages_list | length > 0
    ignore_errors: true

  #####################################################################
  # KERNEL CHECK
  #####################################################################

  - name: Get running kernel version
    command: uname -r
    register: running_kernel
    changed_when: false

  #####################################################################
  # GET LATEST INSTALLED KERNEL
  #####################################################################

  # Debian
  - name: Get latest installed kernel (Debian-based)
    shell: >
      dpkg -l 'linux-image-*'
      | awk '/^ii/{print $2}'
      | sort -V
      | tail -n1
      | sed 's/linux-image-//'
    register: latest_kernel
    changed_when: false
    when: ansible_facts['os_family'] == "Debian"

  # RedHat
  - name: Get latest installed kernel (RedHat-based)
    shell: >
      rpm -q kernel
      | sort -V
      | tail -n1
      | sed 's/kernel-//'
    register: latest_kernel
    changed_when: false
    when: ansible_facts['os_family'] == "RedHat"

  # SUSE
  - name: Get latest installed kernel (SUSE-based)
    shell: >
      rpm -q kernel-default
      | sort -V
      | tail -n1
      | sed 's/kernel-default-//'
    register: latest_kernel
    changed_when: false
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # PRINT ONLY OLD + NEW KERNEL
  #####################################################################

  - name: Print kernel versions
    debug:
      msg: |
        Old kernel: {{ running_kernel.stdout.strip() }}
        New kernel: {{ latest_kernel.stdout.strip() }}

  #####################################################################
  # REBOOT IF REQUIRED
  #####################################################################

  - name: Reboot system if new kernel detected
    reboot:
      msg: "Reboot triggered by Ansible (new kernel installed)"
      reboot_timeout: 900
    when: running_kernel.stdout.strip() != latest_kernel.stdout.strip()
