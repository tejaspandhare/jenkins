---
############################################################
# ENTERPRISE LINUX PATCHING
############################################################

- name: Enterprise Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  serial: 3        # Parallel batching (patch 3 servers at a time)

  vars:
    reboot_timeout: 600
    patch_failed: false

############################################################
# PRE PATCH HEALTH CHECK
############################################################

  tasks:

  - name: Show patch start
    debug:
      msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

  - name: Check disk space
    command: df -h / /var /usr /boot
    register: disk_check
    changed_when: false

  - name: Fail if disk space less than 1GB
    shell: |
      free=$(df --output=avail -k / | tail -1)
      if [ "$free" -lt 1048576 ]; then exit 1; fi
    register: disk_result
    ignore_errors: yes
    changed_when: false

  - name: Stop patching if disk full
    fail:
      msg: "Not enough disk space for patching"
    when: disk_result.rc != 0

  - name: Check load average
    command: uptime
    register: load_check
    changed_when: false

############################################################
# CAPTURE CURRENT KERNEL
############################################################

  - name: Capture current kernel
    command: uname -r
    register: old_kernel
    changed_when: false

############################################################
# PATCHING SECTION
############################################################

  - name: Update Debian systems
    apt:
      update_cache: yes
      upgrade: dist
      autoremove: yes
    when: ansible_os_family == "Debian"
    register: patch_result
    ignore_errors: yes

  - name: Update RHEL systems
    dnf:
      name: "*"
      state: latest
    when: ansible_os_family == "RedHat"
    register: patch_result
    ignore_errors: yes

  - name: Update SUSE systems
    zypper:
      name: "*"
      state: latest
    when: ansible_os_family == "Suse"
    register: patch_result
    ignore_errors: yes

############################################################
# CHECK IF REBOOT REQUIRED
############################################################

  - name: Check reboot requirement (Debian)
    stat:
      path: /var/run/reboot-required
    register: reboot_file
    when: ansible_os_family == "Debian"

  - name: Set reboot flag
    set_fact:
      reboot_required: "{{ reboot_file.stat.exists | default(false) }}"

############################################################
# REBOOT SERVER IF REQUIRED
############################################################

  - name: Reboot system
    reboot:
      msg: "Reboot triggered by patching"
      reboot_timeout: "{{ reboot_timeout }}"
    when: reboot_required

  - name: Wait for server
    wait_for_connection:
      delay: 10
      timeout: 300
    when: reboot_required

############################################################
# POST PATCH VALIDATION
############################################################

  - name: Capture new kernel
    command: uname -r
    register: new_kernel
    changed_when: false

  - name: Detect kernel rollback
    fail:
      msg: "Kernel rollback detected! Patch might have failed."
    when: new_kernel.stdout < old_kernel.stdout

  - name: Check system status
    command: systemctl is-system-running
    register: system_status
    changed_when: false
    failed_when: system_status.stdout not in ["running","degraded"]

############################################################
# CLEAN PATCH RESULT OUTPUT
############################################################

  - name: Print patch summary
    debug:
      msg: |
        ==========================================
        Host            : {{ inventory_hostname }}
        OS              : {{ ansible_distribution }}

        Old Kernel      : {{ old_kernel.stdout }}
        New Kernel      : {{ new_kernel.stdout }}

        Packages Updated: {{ patch_result.changed | default(false) }}
        Reboot Performed: {{ reboot_required }}

        System Status   : {{ system_status.stdout }}
        ==========================================
