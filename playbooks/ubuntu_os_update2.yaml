---
- name: Ubuntu OS Patching & Kernel Management
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes

  vars:
    apt_upgrade_options: "dist"
    reboot_required_file: "/var/run/reboot-required"

  tasks:

    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update_result

    - name: Upgrade all packages including dependencies
      ansible.builtin.apt:
        upgrade: "{{ apt_upgrade_options }}"
        autoremove: yes
        install_recommends: yes
      register: upgrade_result
      no_log: true
      ignore_errors: yes

    - name: Get running kernel version
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | sort -V | tail -n1 | sed 's/linux-image-//'
      register: latest_kernel
      changed_when: false

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set host patch result
      ansible.builtin.set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          changed: "{{ upgrade_result.changed | default(false) }}"
          reboot_required: "{{ reboot_file.stat.exists }}"
          running_kernel: "{{ running_kernel.stdout }}"
          latest_kernel: "{{ latest_kernel.stdout }}"
          failed: "{{ upgrade_result is failed }}"

    - name: Append host patch result to global results
      ansible.builtin.set_fact:
        results: "{{ (hostvars['localhost'].results | default([])) + [ patch_result ] }}"
      delegate_to: localhost
      run_once: false

- name: Print batch summary
  hosts: localhost
  gather_facts: false
  tasks:

    - name: Display concise summary
      ansible.builtin.debug:
        msg: |
          ===================================
          TOTAL HOSTS: {{ results | length }}
          UPDATED: {{ results | selectattr('changed','equalto',true) | list | length }}
          REBOOT REQUIRED: {{ results | selectattr('reboot_required','equalto',true) | list | length }}
          FAILED: {{ results | selectattr('failed','equalto',true) | list | length }}
          ===================================
