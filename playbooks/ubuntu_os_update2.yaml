---
- name: Ubuntu OS Patching and Kernel Management
  hosts: "{{ hosts }}"
  become: true
  gather_facts: true

  vars:
    reboot_required: false

  tasks:

    #####################################################################
    # UPDATE APT CACHE AND FIX BROKEN PACKAGES
    #####################################################################
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages including kernel
      apt:
        upgrade: dist
        install_recommends: yes
        autoclean: yes
      register: upgrade_result

    #####################################################################
    # GET KERNEL VERSIONS
    #####################################################################
    - name: Get running kernel version
      shell: uname -r
      register: running_kernel
      changed_when: false

    - name: Get latest installed kernel version
      shell: dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | sort -V | tail -n1
      register: latest_kernel_raw
      changed_when: false

    - name: Set latest kernel fact
      set_fact:
        latest_kernel_version: "{{ latest_kernel_raw.stdout | regex_replace('^linux-image-', '') }}"
        running_kernel_version: "{{ running_kernel.stdout }}"

    #####################################################################
    # CHECK IF REBOOT IS REQUIRED
    #####################################################################
    - name: Check if system reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_file

    - name: Set reboot required fact
      set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    # PRINT KERNEL INFO IN COLORS
    #####################################################################
    - name: Print kernel versions
      debug:
        msg: |
          \033[1;34m==============================\033[0m
          \033[1;36mRunning Kernel: \033[0m {{ running_kernel_version }}
          \033[1;32mLatest Installed Kernel: \033[0m {{ latest_kernel_version }}
          {% if reboot_required %}
          \033[1;31mReboot Required: YES\033[0m
          {% else %}
          \033[1;32mReboot Required: NO\033[0m
          {% endif %}
          \033[1;33mKernel after reboot: \033[0m {{ latest_kernel_version }}
          \033[1;34m==============================\033[0m

    #####################################################################
    # PERFORM REBOOT IF REQUIRED
    #####################################################################
    - name: Reboot system if required
      reboot:
        reboot_timeout: 600
        test_command: uname -r
      when: reboot_required
