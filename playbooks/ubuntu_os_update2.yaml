---
####################################################
# PATCH LINUX SERVERS
####################################################
- name: Universal Linux Patching
  hosts: "{{ hosts.split(',') }}"
  become: yes
  gather_facts: yes
  serial: 50

  tasks:

    - name: Start patching
      debug:
        msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

    ####################################
    # UBUNTU / DEBIAN
    ####################################
    - name: Ubuntu update cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"
      register: update_result

    - name: Ubuntu upgrade packages
      apt:
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: upgrade_result
      ignore_errors: yes

    ####################################
    # RHEL / CENTOS / ROCKY
    ####################################
    - name: RHEL family patching
      dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"
      register: upgrade_result
      ignore_errors: yes

    ####################################
    # SLES
    ####################################
    - name: SLES patching
      zypper:
        name: "*"
        state: latest
      when: ansible_os_family == "Suse"
      register: upgrade_result
      ignore_errors: yes

    ####################################
    # REBOOT CHECK
    ####################################
    - name: Check reboot required (Debian)
      stat:
        path: /var/run/reboot-required
      when: ansible_os_family == "Debian"
      register: reboot_file

    - name: Check reboot required (RHEL family)
      shell: needs-restarting -r
      when: ansible_os_family == "RedHat"
      register: reboot_check
      failed_when: false
      changed_when: false

    - name: Check reboot required (SLES)
      shell: zypper ps
      when: ansible_os_family == "Suse"
      register: reboot_check_suse
      failed_when: false
      changed_when: false

    ####################################
    # NORMALIZE REBOOT RESULT
    ####################################
    - name: Set reboot fact
      set_fact:
        reboot_required: >-
          {{
            (ansible_os_family == 'Debian' and reboot_file.stat.exists)
            or
            (ansible_os_family == 'RedHat' and reboot_check.rc != 0)
            or
            (ansible_os_family == 'Suse' and reboot_check_suse.stdout != "")
          }}

    ####################################
    # SAVE PATCH RESULT
    ####################################
    - name: Save patch result
      set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          os: "{{ ansible_distribution }}"
          updated: "{{ upgrade_result.changed | default(false) }}"
          failed: "{{ upgrade_result.failed | default(false) }}"
          reboot_required: "{{ reboot_required }}"

    - name: Print host summary
      debug:
        msg: "Host={{ patch_result.host }} OS={{ patch_result.os }} Updated={{ patch_result.updated }} Reboot={{ patch_result.reboot_required }} Failed={{ patch_result.failed }}"

####################################################
# FINAL SUMMARY
####################################################
- name: Patch Summary
  hosts: localhost
  gather_facts: no

  tasks:

    - name: Collect results
      set_fact:
        patch_results: "{{ groups['all'] | map('extract', hostvars, 'patch_result') | select('defined') | list }}"

    - name: Calculate stats
      set_fact:
        total_hosts: "{{ patch_results | length }}"
        updated_hosts: "{{ patch_results | selectattr('updated','equalto',true) | list | length }}"
        reboot_hosts: "{{ patch_results | selectattr('reboot_required','equalto',true) | list | length }}"
        failed_hosts: "{{ patch_results | selectattr('failed','equalto',true) | list | length }}"

    - name: Print final summary
      debug:
        msg: |
          ======================================
          UNIVERSAL LINUX PATCH SUMMARY
          ======================================
          Total Servers   : {{ total_hosts }}
          Updated Servers : {{ updated_hosts }}
          Failed Servers  : {{ failed_hosts }}
          Reboot Required : {{ reboot_hosts }}
          ======================================
