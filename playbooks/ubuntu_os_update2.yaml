---
- name: Cross-Platform OS Patching & Kernel Management
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes
  serial: 3   # parallel batching

  vars:
    reboot_timeout: 600
    patch_results: []

  tasks:

    ############################################################
    # PRE-PATCH HEALTH CHECK
    ############################################################
    - name: Show patch start
      ansible.builtin.debug:
        msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

    - name: Check disk space
      ansible.builtin.command: df -h /
      register: disk_check
      changed_when: false

    - name: Fail if disk space < 1GB
      ansible.builtin.shell: |
        free=$(df --output=avail / | tail -1)
        if [ "$free" -lt 1048576 ]; then exit 1; fi
      register: disk_result
      ignore_errors: yes
      changed_when: false

    - name: Stop patching if disk full
      ansible.builtin.fail:
        msg: "Not enough disk space for patching"
      when: disk_result.rc != 0

    ############################################################
    # CAPTURE CURRENT KERNEL
    ############################################################
    - name: Capture current kernel
      ansible.builtin.command: uname -r
      register: running_kernel
      changed_when: false

    ############################################################
    # PATCHING SECTION
    ############################################################
    - name: Update Debian/Ubuntu
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        install_recommends: yes
      when: ansible_os_family == "Debian"
      register: patch_result
      ignore_errors: yes

    - name: Update RHEL/CentOS/Rocky
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"
      register: patch_result
      ignore_errors: yes

    - name: Update SLES/SUSE
      ansible.builtin.zypper:
        name: "*"
        state: latest
      when: ansible_os_family == "Suse"
      register: patch_result
      ignore_errors: yes

    ############################################################
    # CHECK IF REBOOT REQUIRED
    ############################################################
    - name: Set reboot_required fact (Debian/Ubuntu)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_file
      when: ansible_os_family == "Debian"

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists | default(false) }}"

    ############################################################
    # REBOOT SERVER IF REQUIRED
    ############################################################
    - name: Reboot system if needed
      ansible.builtin.reboot:
        msg: "Reboot triggered by patching"
        reboot_timeout: "{{ reboot_timeout }}"
      when: reboot_required

    - name: Wait for server if rebooted
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      when: reboot_required

    ############################################################
    # POST PATCH VALIDATION
    ############################################################
    - name: Capture new kernel
      ansible.builtin.command: uname -r
      register: new_kernel
      changed_when: false

    - name: Detect kernel rollback
      ansible.builtin.fail:
        msg: "\033[0;31mKernel rollback detected! Patch might have failed.\033[0m"
      when: new_kernel.stdout is defined and (new_kernel.stdout < running_kernel.stdout)

    - name: Check system status
      ansible.builtin.command: systemctl is-system-running
      register: system_status
      changed_when: false
      failed_when: system_status.stdout not in ["running","degraded"]

    ############################################################
    # CLEAN HOST SUMMARY
    ############################################################
    - name: Record patch results for recap
      ansible.builtin.set_fact:
        patch_results: "{{ patch_results + [ {
          'host': inventory_hostname,
          'updated': patch_result.changed | default(false),
          'rebooted': reboot_required | default(false),
          'failed': patch_result.failed | default(false)
        } ] }}"

    - name: Display host patch summary
      ansible.builtin.debug:
        msg: |
          \033[0;34m============================================\033[0m
          \033[0;32mHost                :\033[0m {{ inventory_hostname }}
          \033[0;32mPackages Updated    :\033[0m {{ patch_result.changed | default(false) }}
          \033[0;32mRunning Kernel      :\033[0m {{ running_kernel.stdout }}
          \033[0;32mLatest Kernel       :\033[0m {{ new_kernel.stdout }}
          \033[0;33mReboot Performed    :\033[0m {{ reboot_required | default(false) }}
          \033[0;32mSystem Status       :\033[0m {{ system_status.stdout }}
          \033[0;34m============================================\033[0m
      changed_when: false

- name: Final Play Recap
  hosts: localhost
  gather_facts: no
  vars:
    all_patch_results: "{{ hostvars | dict2items | map(attribute='value.patch_results') | select('defined') | sum(start=[]) }}"
  tasks:
    - name: Display ANSI-colored patch recap
      ansible.builtin.debug:
        msg: |
          \033[0;34m============================================\033[0m
          \033[0;32mTOTAL HOSTS       :\033[0m {{ all_patch_results | length }}
          \033[0;32mHOSTS UPDATED     :\033[0m {{ all_patch_results | selectattr('updated','equalto',true) | list | length }}
          \033[0;31mHOSTS FAILED      :\033[0m {{ all_patch_results | selectattr('failed','equalto',true) | list | length }}
          \033[0;33mHOSTS REBOOTED    :\033[0m {{ all_patch_results | selectattr('rebooted','equalto',true) | list | length }}
          \033[0;34m============================================\033[0m
      changed_when: false
