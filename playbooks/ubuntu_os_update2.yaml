---
- name: Ubuntu OS Full Patching & Kernel Check
  hosts: "{{ hosts | default('all') }}"
  become: yes
  gather_facts: yes

  vars:
    reboot_required_file: /var/run/reboot-required

  tasks:

    #####################################################################
    - name: Update APT cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    #####################################################################
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        install_recommends: yes
      register: upgrade_result

    #####################################################################
    - name: Autoremove unused packages (old kernels, etc.)
      ansible.builtin.apt:
        autoremove: yes
      register: autoremove_result

    #####################################################################
    - name: Get running kernel version
      ansible.builtin.shell: uname -r
      register: running_kernel
      changed_when: false

    #####################################################################
    - name: Get latest installed kernel version
      ansible.builtin.shell: |
        dpkg -l 'linux-image-*' | awk '/^ii/{print $2}' | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-generic' | sort -V | tail -n1
      register: latest_kernel
      changed_when: false

    #####################################################################
    - name: Determine if reboot is required
      ansible.builtin.stat:
        path: "{{ reboot_required_file }}"
      register: reboot_file

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists }}"

    #####################################################################
    - name: Print kernel information with colors
      ansible.builtin.debug:
        msg: |
          \033[1;34m==============================\033[0m
          \033[1;36mRunning Kernel: \033[0m {{ running_kernel.stdout }}
          \033[1;32mLatest Installed Kernel: \033[0m {{ latest_kernel.stdout }}
          \033[1;32mReboot Required: \033[0m {{ 'YES' if reboot_required else 'NO' }}
          \033[1;33mKernel after reboot: \033[0m {{ latest_kernel.stdout if reboot_required else running_kernel.stdout }}
          \033[1;34m==============================\033[0m

    #####################################################################
    - name: Reboot system if required
      ansible.builtin.reboot:
        reboot_timeout: 600
        pre_reboot_delay: 5
      when: reboot_required
