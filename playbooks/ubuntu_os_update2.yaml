---
- name: Ubuntu OS Patching
  hosts: all
  become: yes
  gather_facts: yes
  serial: 50   # batches of 50 servers
  vars:
    patch_results: []

  tasks:

    - name: Print host starting patch
      ansible.builtin.debug:
        msg: "Running OS patching on {{ inventory_hostname }}"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      register: update_cache_result

    - name: Upgrade packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
      register: upgrade_result
      ignore_errors: yes

    - name: Check if reboot is required
      ansible.builtin.shell: /usr/bin/needs-restarting -r || echo "no"
      register: reboot_check
      changed_when: false
      failed_when: false

    - name: Gather patch results per host
      ansible.builtin.set_fact:
        patch_result:
          host: "{{ inventory_hostname }}"
          changed: "{{ upgrade_result.changed | default(false) }}"
          failed: "{{ upgrade_result.failed | default(false) }}"
          reboot_required: "{{ 'yes' in reboot_check.stdout | lower }}"
          running_kernel: "{{ ansible_kernel }}"
          latest_kernel: "{{ ansible_kernel }}"   # you can replace with logic to fetch latest installed kernel

    - name: Append host patch_result to global list
      ansible.builtin.set_fact:
        patch_results: "{{ patch_results + [ patch_result ] }}"

    - name: Print host patch summary
      ansible.builtin.debug:
        msg: "Host: {{ inventory_hostname }} | Updated: {{ patch_result.changed }} | Reboot: {{ patch_result.reboot_required }} | Failed: {{ patch_result.failed }} | Running Kernel: {{ patch_result.running_kernel }} | Latest Kernel: {{ patch_result.latest_kernel }}"

- name: Display final summary
  hosts: localhost
  gather_facts: no
  tasks:

    - name: Display concise summary
      ansible.builtin.debug:
        msg: |
          ===================================
          TOTAL HOSTS: {{ patch_results | length }}
          UPDATED: {{ patch_results | selectattr('changed','equalto',true) | list | length }}
          REBOOT REQUIRED: {{ patch_results | selectattr('reboot_required','equalto',true) | list | length }}
          FAILED: {{ patch_results | selectattr('failed','equalto',true) | list | length }}
          ===================================
