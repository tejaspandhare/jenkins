---
- name: Enterprise Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: yes
  serial: 3   # parallel batching

  vars:
    reboot_timeout: 600
    patch_results: []

  tasks:

    ############################################################
    # PRE-PATCH HEALTH CHECK
    ############################################################
    - name: Show patch start
      ansible.builtin.debug:
        msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

    - name: Check disk space
      ansible.builtin.command: df -h / /var /usr /boot
      register: disk_check
      changed_when: false

    - name: Fail if disk space less than 1GB
      ansible.builtin.shell: |
        free=$(df --output=avail / | tail -1)
        if [ "$free" -lt 1048576 ]; then exit 1; fi
      register: disk_result
      ignore_errors: yes
      changed_when: false

    - name: Stop patching if disk full
      ansible.builtin.fail:
        msg: "Not enough disk space for patching"
      when: disk_result.rc != 0

    ############################################################
    # CAPTURE CURRENT KERNEL
    ############################################################
    - name: Capture current kernel
      ansible.builtin.command: uname -r
      register: old_kernel
      changed_when: false

    ############################################################
    # PATCHING
    ############################################################
    - name: Update Debian/Ubuntu/Mint
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: patch_result
      ignore_errors: yes

    - name: Update RHEL/CentOS/Rocky
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"
      register: patch_result
      ignore_errors: yes

    - name: Update SUSE/SLES
      ansible.builtin.zypper:
        name: "*"
        state: latest
      when: ansible_os_family == "Suse"
      register: patch_result
      ignore_errors: yes

    ############################################################
    # REBOOT CHECK
    ############################################################
    - name: Check reboot requirement (Debian)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_file
      when: ansible_os_family == "Debian"

    - name: Set reboot flag
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_file.stat.exists | default(false) }}"

    ############################################################
    # REBOOT IF REQUIRED
    ############################################################
    - name: Reboot system if required
      ansible.builtin.reboot:
        msg: "Reboot triggered by patching"
        reboot_timeout: "{{ reboot_timeout }}"
      when: reboot_required

    - name: Wait for server if rebooted
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      when: reboot_required

    ############################################################
    # POST-PATCH VALIDATION
    ############################################################
    - name: Capture new kernel
      ansible.builtin.command: uname -r
      register: new_kernel
      changed_when: false

    - name: Check system status
      ansible.builtin.command: systemctl is-system-running
      register: system_status
      changed_when: false
      failed_when: system_status.stdout not in ["running","degraded"]

    ############################################################
    # RECORD PATCH RESULT
    ############################################################
    - name: Set host patch result
      ansible.builtin.set_fact:
        patch_results:
          - host: "{{ inventory_hostname }}"
            updated: "{{ patch_result.changed | default(false) }}"
            rebooted: "{{ reboot_required }}"
            failed: "{{ patch_result.failed | default(false) }}"
            running_kernel: "{{ old_kernel.stdout }}"
            latest_kernel: "{{ new_kernel.stdout }}"
            system_status: "{{ system_status.stdout }}"

    ############################################################
    # CLEAN HOST OUTPUT
    ############################################################
    - name: Display patching summary per host
      ansible.builtin.debug:
        msg: |
          \033[0;34m============================================\033[0m
          \033[0;32mHost                :\033[0m {{ inventory_hostname }}
          \033[0;32mPackages Updated    :\033[0m {{ patch_result.changed | default(false) }}
          \033[0;32mRunning Kernel      :\033[0m {{ old_kernel.stdout }}
          \033[0;32mLatest Kernel       :\033[0m {{ new_kernel.stdout }}
          \033[0;33mReboot Performed    :\033[0m {{ reboot_required }}
          \033[0;32mSystem Status       :\033[0m {{ system_status.stdout }}
          \033[0;34m============================================\033[0m

- name: Play Recap
  hosts: localhost
  gather_facts: no
  vars:
    all_patch_results: >-
      {{ groups['all'] 
         | map('extract', hostvars) 
         | map(attribute='patch_results') 
         | map('default', []) 
         | sum(start=[]) }}
  tasks:
    - name: Display ANSI-colored patch recap
      ansible.builtin.shell: |
        TOTAL_HOSTS={{ all_patch_results | length }}
        HOSTS_UPDATED={{ all_patch_results | selectattr('updated','equalto',true) | list | length }}
        HOSTS_FAILED={{ all_patch_results | selectattr('failed','equalto',true) | list | length }}
        HOSTS_REBOOTED={{ all_patch_results | selectattr('rebooted','equalto',true) | list | length }}

        echo -e "\033[0;34m============================================\033[0m"
        echo -e "\033[0;32mTOTAL HOSTS       :\033[0m $TOTAL_HOSTS"
        echo -e "\033[0;32mHOSTS UPDATED     :\033[0m $HOSTS_UPDATED"
        echo -e "\033[0;31mHOSTS FAILED      :\033[0m $HOSTS_FAILED"
        echo -e "\033[0;33mHOSTS REBOOTED    :\033[0m $HOSTS_REBOOTED"
        echo -e "\033[0;34m============================================\033[0m"
      changed_when: false
