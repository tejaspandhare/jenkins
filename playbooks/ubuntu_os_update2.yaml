---
- name: Enterprise Linux OS Patching
  hosts: "{{ hosts }}"
  become: yes
  gather_facts: false
  serial: 3

  vars:
    reboot_timeout: 600

  tasks:

  ########################################################
  # MINIMAL FACTS
  ########################################################

  - name: Gather minimal facts
    setup:
      gather_subset:
        - min

  ########################################################
  # PATCH START
  ########################################################

  - name: Patch start
    debug:
      msg: "Starting patching on {{ inventory_hostname }} ({{ ansible_distribution }})"

  ########################################################
  # PRECHECK
  ########################################################

  - name: Check disk space
    shell: df --output=avail -k / | tail -1
    register: disk
    changed_when: false
    failed_when: disk.stdout|int < 1048576

  ########################################################
  # CURRENT KERNEL
  ########################################################

  - name: Get current kernel
    command: uname -r
    register: old_kernel
    changed_when: false

  ########################################################
  # PATCH SYSTEM
  ########################################################

  - name: Patch Ubuntu/Debian
    apt:
      update_cache: yes
      upgrade: dist
      autoremove: yes
    when: ansible_os_family == "Debian"
    register: patch_result

  - name: Patch RHEL
    dnf:
      name: "*"
      state: latest
    when: ansible_os_family == "RedHat"
    register: patch_result

  ########################################################
  # REBOOT CHECK
  ########################################################

  - name: Check reboot requirement
    stat:
      path: /var/run/reboot-required
    register: reboot_file
    when: ansible_os_family == "Debian"

  - name: Set reboot flag
    set_fact:
      reboot_required: "{{ reboot_file.stat.exists | default(false) }}"

  ########################################################
  # REBOOT
  ########################################################

  - name: Reboot server if required
    reboot:
      reboot_timeout: "{{ reboot_timeout }}"
    when: reboot_required

  ########################################################
  # VALIDATION
  ########################################################

  - name: Get new kernel
    command: uname -r
    register: new_kernel
    changed_when: false

  - name: Check system state
    command: systemctl is-system-running
    register: system_state
    changed_when: false

  ########################################################
  # CLEAN SUMMARY
  ########################################################

  - name: Patch summary
    debug:
      msg: |
        ==========================================
        Host            : {{ inventory_hostname }}
        OS              : {{ ansible_distribution }}
        Old Kernel      : {{ old_kernel.stdout }}
        New Kernel      : {{ new_kernel.stdout }}
        Packages Updated: {{ patch_result.changed | default(false) }}
        Reboot Performed: {{ reboot_required | default(false) }}
        System Status   : {{ system_state.stdout }}
        ==========================================
