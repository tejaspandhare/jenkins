---
- name: Cross-Platform OS Maintenance
  hosts: "{{ hosts.split(';') }}"
  gather_facts: true
  become: true

  vars:
    EXCLUDE_PKGS: "{{ lookup('env', 'EXCLUDE_PKGS') | default('') }}"
    exclude_packages_list: "{{ EXCLUDE_PKGS.split(';') | map('trim') | reject('equalto','') | list }}"

  tasks:

  #####################################################################
  # DISPLAY OS INFO
  #####################################################################
  - name: Display detected OS information
    debug:
      msg:
        - "OS Family: {{ ansible_facts['os_family'] }}"
        - "Distribution: {{ ansible_facts['distribution'] }}"
        - "Version: {{ ansible_facts['distribution_version'] }}"

  #####################################################################
  # PACKAGE UPDATES
  #####################################################################
  - name: Update and upgrade (Debian/Ubuntu)
    apt:
      update_cache: yes
      upgrade: dist
      autoremove: yes
      autoclean: yes
    when: ansible_facts['os_family'] == "Debian"

  - name: Update packages (RHEL 7 and below)
    yum:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int < 8

  - name: Update packages (RHEL 8+ / Alma / Rocky)
    dnf:
      name: "*"
      state: latest
    when:
      - ansible_facts['os_family'] == "RedHat"
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: Update packages (SUSE)
    zypper:
      name: "*"
      state: latest
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # HOLD PACKAGES (Debian Only)
  #####################################################################
  - name: Hold excluded packages (Debian-based)
    command: apt-mark hold {{ item }}
    loop: "{{ exclude_packages_list }}"
    when:
      - ansible_facts['os_family'] == "Debian"
      - exclude_packages_list | length > 0
    ignore_errors: true

  #####################################################################
  # KERNEL CHECK
  #####################################################################
  - name: Get running kernel version
    command: uname -r
    register: running_kernel
    changed_when: false

  - name: Get latest installed kernel (Debian/Ubuntu)
    shell: |
      dpkg --list | grep '^ii' | grep 'linux-image-[0-9]' | awk '{print $2}' | sort -V | tail -n1
    register: latest_kernel_debian
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "Debian"

  - name: Get latest installed kernel (RedHat-based)
    shell: |
      rpm -q kernel | sort -V | tail -n1
    register: latest_kernel_redhat
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "RedHat"

  - name: Get latest installed kernel (SUSE-based)
    shell: |
      rpm -q kernel-default | sort -V | tail -n1
    register: latest_kernel_suse
    changed_when: false
    failed_when: false
    when: ansible_facts['os_family'] == "Suse"

  #####################################################################
  # NORMALIZE KERNEL VARIABLES
  #####################################################################
  - name: Normalize kernel variables
    set_fact:
      running_kernel_version: "{{ running_kernel.stdout | default('UNKNOWN') | trim }}"
      latest_kernel_version: >-
        {{ (latest_kernel_debian.stdout | regex_replace('^linux-image-', '') if latest_kernel_debian is defined and latest_kernel_debian.stdout | length > 0 else
           (latest_kernel_redhat.stdout if latest_kernel_redhat is defined else
           (latest_kernel_suse.stdout if latest_kernel_suse is defined else 'UNKNOWN'))) | trim }}

  - name: Parse kernel major.minor
    set_fact:
      running_kernel_major_minor: "{{ running_kernel_version.split('-')[0].split('.')[:2] | join('.') }}"
      latest_kernel_major_minor: "{{ latest_kernel_version.split('-')[0].split('.')[:2] | join('.') }}"

  - name: Determine if reboot is required (major/minor version change only)
    set_fact:
      reboot_required: "{{ running_kernel_major_minor != latest_kernel_major_minor and latest_kernel_version != 'UNKNOWN' }}"

  #####################################################################
  # DISPLAY KERNEL STATUS
  #####################################################################
  - name: Display kernel comparison
    debug:
      msg: |
        ==============================
        Running Kernel: {{ running_kernel_version }}
        Latest Installed Kernel: {{ latest_kernel_version }}
        Reboot Required: {{ 'YES' if reboot_required else 'NO' }}
        Kernel after reboot: {{ latest_kernel_version if reboot_required else running_kernel_version }}
        ==============================

  #####################################################################
  # REBOOT IF NEEDED
  #####################################################################
  - name: Reboot system if new kernel detected
    reboot:
      msg: "Reboot triggered by Ansible (new kernel installed)"
      reboot_timeout: 900
    when: reboot_required
